<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilities / Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono&display=swap');
        
        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: #666;
        }

        .link-item {
            border-bottom: 1px solid #1a1a1a;
            transition: all 0.2s ease;
        }

        .link-item:hover {
            color: #eee;
            border-bottom-color: #991b1b;
            padding-left: 8px;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
            opacity: 0.2;
        }

        ::selection {
            background: #991b1b;
            color: white;
        }
    </style>
</head>
<body class="p-8 md:p-24">

    <div class="scanline"></div>

    <main class="max-w-2xl relative z-20">
        <header class="mb-20">
            <div class="flex items-center gap-3 mb-4">
                <a href="index.html" class="text-[10px] uppercase tracking-widest hover:text-red-700 transition"><< Back</a>
            </div>
            <h1 class="text-white text-xl tracking-tighter uppercase">Projects</h1>
            <p class="text-sm leading-relaxed max-w-md mt-4">
                Go ahead. Give it a try.
            </p>
        </header>

        <section class="space-y-8">
            <!-- Your Existing Tool -->
            <div class="group">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-[10px] opacity-40 uppercase tracking-widest">Project #1</span>
                    <span class="text-[10px] opacity-20">v1.0</span>
                </div>
                <a href="tool.html" class="link-item block py-3 text-lg">Roth IRA Calculator</a>
                <p class="text-[10px] mt-2 opacity-30">The original HTML tool hosted on this domain.</p>
            </div>

            <!-- Future Placeholder 1 -->
            <div class="group opacity-50">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-[10px] opacity-40 uppercase tracking-widest">System_Slot_02</span>
                    <span class="text-[10px] opacity-20">[EMPTY]</span>
                </div>
                <div class="border-b border-dashed border-[#1a1a1a] py-3 text-lg italic text-slate-800">Available for expansion...</div>
            </div>
        </section>

        <footer class="mt-32 pt-8 border-t border-[#111]">
            <p class="text-[10px] uppercase tracking-widest opacity-20">
                End of directory.
            </p>
        </footer>
    </main>

</body>
</html>
