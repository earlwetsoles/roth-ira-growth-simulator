<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --crimson: #991b1b;
            --terminal-gray: #666;
            --terminal-off-white: #eee;
            --glitch-color: #ff0000;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: var(--terminal-gray);
            overflow-x: hidden;
        }

        /* CRT Scanline */
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        /* Rapid POST Sequence Overlay */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 500;
            padding: 2rem;
            font-size: 11px;
            color: #444;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: opacity 0.4s ease;
        }

        .post-line {
            line-height: 1.4;
            white-space: nowrap;
        }

        /* Typewriter Animation */
        .typewriter-line {
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            opacity: 0;
        }

        .typing {
            animation: typing-anim 0.8s steps(30, end) forwards;
            opacity: 1;
        }

        @keyframes typing-anim {
            from { width: 0 }
            to { width: 100% }
        }

        /* Link Styling */
        .link-item {
            border-bottom: 1px solid #1a1a1a;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }

        .link-item:hover {
            color: var(--terminal-off-white);
            border-bottom-color: var(--crimson);
            padding-left: 8px;
        }

        /* Widgets */
        .widget-box {
            position: fixed;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 9px;
            z-index: 30;
            color: #444;
            opacity: 0;
            transition: opacity 1s ease;
        }

        @media (min-width: 768px) {
            .widget-box { width: 240px; right: 2rem; }
            .diag-box { top: 2rem; }
            .audio-box { top: 18rem; }
        }

        @media (max-width: 767px) {
            .widget-box { 
                width: 45%; 
                font-size: 8px;
                padding: 6px;
                bottom: 1rem;
            }
            .diag-box { left: 1rem; height: 110px; }
            .audio-box { right: 1rem; height: 130px; }
            #diag-logs { height: 40px !important; }
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 0.25rem;
        }

        .widget-title { color: var(--crimson); font-weight: bold; }
        .progress-container { width: 100%; height: 2px; background: #1a1a1a; margin: 8px 0; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--crimson); width: 0%; transition: width 0.1s linear; }
        .audio-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .audio-btn { background: none; border: none; color: #444; cursor: pointer; padding: 0; transition: color 0.2s; }
        .audio-btn:hover { color: var(--terminal-off-white); }

        /* Terminal Cursor Styling */
        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--crimson);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Glitch styles */
        .glitch-active {
            color: var(--glitch-color);
            text-shadow: 1px 0px 4px rgba(255,0,0,0.5);
        }

        /* Hidden Terminal Console */
        #console-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid var(--crimson);
            padding: 10px 20px;
            z-index: 1000;
            display: none;
            align-items: center;
            font-size: 12px;
            color: var(--terminal-off-white);
        }
        #console-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--terminal-off-white);
            flex-grow: 1;
            margin-left: 10px;
            font-family: 'Space Mono', monospace;
        }

        /* Analog VU Meter */
        .vu-meter-container {
            display: flex;
            gap: 2px;
            height: 12px;
            align-items: flex-end;
            margin-top: 10px;
            padding-top: 4px;
            border-top: 1px solid #111;
        }
        .vu-bar {
            flex: 1;
            background: #1a1a1a;
            height: 2px;
            transition: height 0.15s ease, background 0.15s ease;
        }
        .vu-bar.active {
            background: #444;
        }
        .vu-bar.peak {
            background: var(--crimson);
        }
    </style>
</head>
<body class="p-8 md:p-24 pb-48 md:pb-24">

    <script>
        // ================= CONFIG & ASSETS =================
        const bootData = [
            "Initializing BIOS...", "Verifying CPU...", "Memory Test: 16384MB OK",
            "SATA Primary Master: 500GB SSD", "USB Controller Initialized...",
            "Network Card Found [MAC: 00:1A:2B:3C:4D:5E]", "DHCP Handshake... OK",
            "Loading Kernel ARCH_OS_01...", "Mounting /dev/sda1...",
            "Encryption Layer: AES-256 Enabled", "Checking Archive Integrity...",
            "Checksum 0xAF43... PASSED", "Loading UI Assets...",
            "Starting Media Engine...", "Redirecting I/O...",
            "SUCCESS: System Boot Sequence Complete."
        ];

        const audioTracks = [
            { name: "MARIO LEMIEUXX", url: "audio/01 Mario Lemieuxx.mp3" },
            { name: "A PARTRIDGE & A PEAR TREE", url: "audio/02. A Partridge & A Pear Tree (Feat. Tha God Fahim) (Prod. By Sage Elsesser).mp3" },
            { name: "FROMAJ", url: "audio/02 Fromaj feat. JuJu Gotti.mp3" },
            { name: "JFMAMJJASOND", url: "audio/03 JFMAMJJASOND.mp3" },
            { name: "SO MUCH MORE", url: "audio/03. So Much More (Prod. By Alchemist).mp3" },
            { name: "ALLEN IVERSON", url: "audio/04. Allen Iverson (Feat. Heem Stogied) (Prod. By Earl Sweatshirt).mp3" },
            { name: "WINGARIUM LEVIOSA (ADVANCED LISTENING)", url: "audio/06 Wingarium Leviosa (Advanced Listening).mp3" },
            { name: "DNA SWAB", url: "audio/06. DNA Swab (Feat. Tha God Fahim) (Prod. By Earl Sweatshirt).mp3" },
            { name: "MAC FLURRIES", url: "audio/08. Mac Flurries (Feat. Heem Stogied) (Prod. By Sage Elsesser).mp3" },
            { name: "LONG TIME", url: "audio/10. Long Time (Prod. By Alchemist).mp3" },
            { name: "AIRWORKS", url: "audio/12 Airworks.mp3" },
            { name: "DON'T CRY", url: "audio/18 Don't Cry.mp3" },
            { name: "GOBSTOPPER", url: "audio/22 Gobstopper.mp3" },
            { name: "BYE..", url: "audio/29 Bye..mp3" },
            { name: "LAST DONUT OF THE NIGHT", url: "audio/30 Last Donut of the Night.mp3" },
            { name: "DONUTS (INTRO)", url: "audio/31 Donuts (Intro).mp3" },
            { name: "I PROMISE YA", url: "audio/I Promise Ya.mp3" },
            { name: "SPRAY 4 ME", url: "audio/Gucci Mane - Spray 4 Me (Prod By DPBEATS).mp3" },
            { name: "IT JUST DOESNT MATTER", url: "audio/07 - It Just Doesnt Matter.mp3" },
            { name: "INSIDE OUTSIDE", url: "audio/01 - Inside Outside.wav.mp3" },
            { name: "SWITCHIN LANES", url: "audio/switchin lanes.mp3" },
            { name: "12 BARS", url: "audio/01 - 12 Bars (DatPiff Exclusive).mp3" },
            { name: "MORGAN TRACY", url: "audio/03 - Morgan Tracy (DatPiff Exclusive).mp3" },
            { name: "FUCK ME", url: "audio/06 - Fuck Me (DatPiff Exclusive).mp3" },
            { name: "IN CASE YOU FORGOT", url: "audio/Roc Marciano - In Case You Forgot.mp3" },
            { name: "RUN-INS", url: "audio/04 - Run-Ins.mp3" },
            { name: "WILLIE LLOYD (INST)", url: "audio/07 Willie Lloyd (Instrumental).mp3" },
            { name: "NO WINDOW TINTS (INST)", url: "audio/06 No Window Tints (Instrumental).mp3" },
            { name: "GAMEBREAKER", url: "audio/Domo Genesis - Gamebreaker ft. Earl Sweatshirt.mp3" },
            { name: "RANDY THE MUSICAL", url: "audio/Action Bronson - Randy The Musical.mp3" },
            { name: "DA COLDEST", url: "audio/01 Da Coldest-HHB.mp3" },
            { name: "HOOVER STREET (OG VERSION)", url: "audio/Schoolboy Q - Hoover Street (Original Version).mp3" },
            { name: "MASSACURES", url: "audio/06. Massacures.mp3" },
            { name: "KNIFE CONFRONTATION", url: "audio/13 - Knife Confrontation.mp3" },
            { name: "$111.11", url: "audio/02. $111.11 feat. Mach-Hommy [Prod. Camoflauge Monk].mp3" },
            { name: "NO MORE TIME", url: "audio/09 No More Time_ (The Change).m4a" },
            { name: "DO YOU KNOW", url: "audio/10 Do You Know_ (Transition).m4a" },
            { name: "JULANI", url: "audio/02 Julani.mp3" },
            { name: "HAPPYNESS (SKIT)", url: "audio/04. Happyness (Skit).mp3" },
            { name: "FUBAR", url: "audio/08. fubar.mp3" },
            { name: "NIGGAS SOOOOO GOOD", url: "audio/05. Niggas Sooooo Good.mp3" },
            { name: "SHERWIN WILLIAMS", url: "audio/Mach-Hommy - DUMPMEISTER - 05 Sherwin Williams feat. Koncept Jack$on (beats by NAVY BLUE).mp3" }
        ];

        // ================= ELEMENTS =================
        const mainAudio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const skipBtn = document.getElementById('skip-btn');
        const trackName = document.getElementById('track-name');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeDisplay = document.getElementById('current-time');
        const muteBtn = document.getElementById('mute-btn');
        const audioStatusText = document.getElementById('audio-status-text');
        const diagLogs = document.getElementById('diag-logs');
        const vuContainer = document.getElementById('vu-meter');

        let currentTrackIndex = Math.floor(Math.random() * audioTracks.length);
        let siteBootTime = Date.now();

        // ================= GLITCH ENGINE =================
        const glitchChars = "█▓▒░$%#@!&*<>/?";
        
        function triggerFakeCrash() {
            const elements = document.querySelectorAll('#app-content a, #app-content h1, #app-content span');
            const target = elements[Math.floor(Math.random() * elements.length)];
            if (!target || target.classList.contains('glitch-active')) return;

            const originalText = target.innerText;
            target.classList.add('glitch-active');
            
            let iterations = 0;
            const maxIterations = 5;
            
            const interval = setInterval(() => {
                target.innerText = originalText.split('').map((char, i) => {
                    if (char === ' ') return char;
                    return Math.random() > 0.7 ? glitchChars[Math.floor(Math.random() * glitchChars.length)] : char;
                }).join('');

                if (iterations >= maxIterations) {
                    clearInterval(interval);
                    target.innerText = originalText;
                    target.classList.remove('glitch-active');
                }
                iterations++;
            }, 80);
        }

        setInterval(() => {
            if (Math.random() > 0.8) triggerFakeCrash();
        }, 4000);

        // ================= ANALOG VU METER =================
        const numBars = 15;
        const bars = [];
        for (let i = 0; i < numBars; i++) {
            const bar = document.createElement('div');
            bar.className = 'vu-bar';
            vuContainer.appendChild(bar);
            bars.push(bar);
        }

        function updateVUMeter() {
            if (mainAudio.paused) {
                bars.forEach(bar => {
                    bar.style.height = '2px';
                    bar.classList.remove('active', 'peak');
                });
            } else {
                bars.forEach((bar, i) => {
                    // Simulated movement for analog feel
                    const noise = Math.random() * 10;
                    const h = Math.max(2, Math.floor(Math.random() * 12));
                    bar.style.height = h + 'px';
                    
                    if (h > 4) bar.classList.add('active');
                    else bar.classList.remove('active');
                    
                    if (h > 9 && i > numBars - 4) bar.classList.add('peak');
                    else bar.classList.remove('peak');
                });
            }
            requestAnimationFrame(updateVUMeter);
        }
        updateVUMeter();

        // ================= TERMINAL SHELL =================
        const consoleContainer = document.getElementById('console-container');
        const consoleInput = document.getElementById('console-input');

        window.addEventListener('keydown', (e) => {
            if (e.key === '~' || e.key === '`') {
                e.preventDefault();
                const isVisible = consoleContainer.style.display === 'flex';
                consoleContainer.style.display = isVisible ? 'none' : 'flex';
                if (!isVisible) consoleInput.focus();
            }
        });

        consoleInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = consoleInput.value.toLowerCase().trim();
                consoleInput.value = '';
                if (cmd === 'help') {
                    addLog("SYS: HELP - CMDS LOCKED IN SAFE MODE");
                } else if (cmd === 'exit' || cmd === 'logout') {
                    consoleContainer.style.display = 'none';
                } else if (cmd !== '') {
                    addLog(`ERR: CMD '${cmd.toUpperCase()}' NOT FOUND`);
                }
            }
        });

        // ================= LOG SYSTEM =================
        const eerieLogs = [
            "WARNING: UNKNOWN_USER_DETECTED",
            "ERR: HEARTBEAT_FOUND_IN_BUFFER",
            "VOID_ACCESS_DENIED",
            "WHY_ARE_YOU_HERE?"
        ];

        function addLog(text) {
            const log = document.createElement('div');
            log.innerText = `> ${text}`;
            diagLogs.prepend(log);
            if (diagLogs.children.length > 8) diagLogs.removeChild(diagLogs.lastChild);
        }

        // ================= SITE CORE =================
        function runPostSequence() {
            const screen = document.getElementById('boot-screen');
            if (!screen) return;
            let count = 0;
            const interval = setInterval(() => {
                if (count < bootData.length) {
                    const line = document.createElement('div');
                    line.className = 'post-line';
                    line.innerText = `[ OK ] ${bootData[count]}`;
                    screen.appendChild(line);
                    screen.scrollTop = screen.scrollHeight;
                    count++;
                } else {
                    clearInterval(interval);
                    setTimeout(revealSite, 300);
                }
            }, 50);
        }

        function revealSite() {
            const screen = document.getElementById('boot-screen');
            const main = document.getElementById('app-content');
            if (screen) screen.style.opacity = '0';
            setTimeout(() => {
                if (screen) screen.remove();
                document.body.style.overflowY = 'auto';
                main.style.opacity = '1';
                document.querySelectorAll('.typewriter-line').forEach(line => {
                    setTimeout(() => line.classList.add('typing'), parseInt(line.getAttribute('data-delay')));
                });
                document.getElementById('diag-widget').style.opacity = '1';
                document.getElementById('audio-widget').style.opacity = '1';
            }, 400);
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function loadTrack(index) {
            const track = audioTracks[index];
            if (!track) return;
            mainAudio.pause();
            mainAudio.currentTime = 0;
            progressBar.style.width = '0%';
            mainAudio.src = track.url;
            trackName.innerText = track.name.toUpperCase();
            mainAudio.load();
        }

        async function skipToRandom() {
            currentTrackIndex = Math.floor(Math.random() * audioTracks.length);
            loadTrack(currentTrackIndex);
            try {
                await mainAudio.play();
                playBtn.innerText = "PAUSE";
                audioStatusText.innerText = "Streaming";
            } catch (e) {
                playBtn.innerText = "PLAY";
            }
        }

        playBtn.onclick = async () => {
            if (mainAudio.paused) {
                try {
                    if (!mainAudio.src || mainAudio.src === window.location.href) loadTrack(currentTrackIndex);
                    await mainAudio.play();
                    playBtn.innerText = "PAUSE";
                    audioStatusText.innerText = "Streaming";
                } catch (e) {
                    audioStatusText.innerText = "Click Play";
                }
            } else {
                mainAudio.pause();
                playBtn.innerText = "PLAY";
                audioStatusText.innerText = "Paused";
            }
        };

        skipBtn.onclick = () => skipToRandom();
        muteBtn.onclick = () => {
            mainAudio.muted = !mainAudio.muted;
            muteBtn.innerText = mainAudio.muted ? "UNMUTE" : "MUTE";
        };

        mainAudio.ontimeupdate = () => {
            if (isNaN(mainAudio.duration) || mainAudio.duration === 0) return;
            const progress = (mainAudio.currentTime / mainAudio.duration) * 100;
            progressBar.style.width = `${progress}%`;
            currentTimeDisplay.innerText = formatTime(mainAudio.currentTime);
        };

        mainAudio.onended = () => skipToRandom();

        document.getElementById('progress-area').onclick = (e) => {
            if (isNaN(mainAudio.duration) || mainAudio.duration === 0) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            mainAudio.currentTime = pos * mainAudio.duration;
        };

        window.addEventListener('DOMContentLoaded', () => {
            runPostSequence();
            loadTrack(currentTrackIndex);

            let startTime = Date.now();
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
                const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                document.getElementById('uptime').innerText = `UP: ${h}:${m}:${s}`;
                document.getElementById('cpu-load').innerText = `${Math.floor(Math.random() * 8 + 1).toString().padStart(2, '0')}%`;
            }, 1000);

            setInterval(() => {
                const totalElapsed = (Date.now() - siteBootTime) / 1000;
                // If 90 seconds have passed, allow eerie logs
                if (totalElapsed > 90 && Math.random() > 0.8) {
                    addLog(eerieLogs[Math.floor(Math.random() * eerieLogs.length)]);
                } else {
                    addLog(["INIT_CORE", "QUERY_DB", "AUTH_GRNT", "STATUS_OK", "PING_GATEWAY"][Math.floor(Math.random()*5)]);
                }
            }, 3000);
        });
