<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVE_01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --crimson: #991b1b;
            --terminal-gray: #666;
            --terminal-off-white: #eee;
            --glitch-color: #ff0000;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: var(--terminal-gray);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* CRT Scanline Overlay */
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        /* Boot Screen Sequence */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 500;
            padding: 2rem;
            font-size: 10px;
            color: #444;
            display: flex;
            flex-direction: column;
            overflow-y: hidden;
            transition: opacity 0.4s ease;
        }

        .post-line {
            line-height: 1.2;
            white-space: nowrap;
            font-family: 'Space Mono', monospace;
        }

        /* Animation Classes */
        .typewriter-line {
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            opacity: 0;
        }

        .typing {
            animation: typing-anim 0.8s steps(30, end) forwards;
            opacity: 1;
        }

        @keyframes typing-anim {
            from { width: 0 }
            to { width: 100% }
        }

        /* Navigation Links */
        .link-item {
            border-bottom: 1px solid #1a1a1a;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }

        .link-item:hover {
            color: var(--crimson);
            border-bottom-color: var(--crimson);
            padding-left: 8px;
            text-shadow: 0 0 5px var(--crimson);
        }

        /* Sidebar Widgets */
        .widget-box {
            position: fixed;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 9px;
            z-index: 30;
            color: #444;
            opacity: 0;
            transition: opacity 1s ease;
        }

        @media (min-width: 768px) {
            .widget-box { width: 240px; right: 2rem; }
            .diag-box { top: 2rem; }
            .audio-box { top: 18rem; }
        }

        @media (max-width: 767px) {
            .widget-box { 
                width: 45%; 
                font-size: 8px;
                padding: 6px;
                bottom: 1rem;
            }
            .diag-box { left: 1rem; height: 110px; }
            .audio-box { right: 1rem; height: 130px; }
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 0.25rem;
        }

        .widget-title { color: var(--crimson); font-weight: bold; }
        
        /* Audio Player Styling */
        .progress-container { width: 100%; height: 4px; background: #1a1a1a; margin: 8px 0; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--crimson); width: 0%; transition: width 0.1s linear; pointer-events: none; }
        .audio-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .audio-btn { background: none; border: none; color: #444; cursor: pointer; padding: 0; transition: color 0.2s; outline: none; }
        .audio-btn:hover { color: var(--terminal-off-white); }
        .audio-btn:active { color: var(--crimson); }

        /* Terminal UI Components */
        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--crimson);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            cursor: pointer;
        }
        
        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        #console-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid var(--crimson);
            padding: 10px 20px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            font-size: 12px;
            color: var(--terminal-off-white);
            max-height: 50vh;
        }

        #console-output {
            overflow-y: auto;
            margin-bottom: 5px;
            font-size: 10px;
            color: #666;
            max-height: 250px;
        }

        .console-input-row { display: flex; align-items: center; }
        
        #console-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--terminal-off-white);
            flex-grow: 1;
            margin-left: 10px;
            font-family: 'Space Mono', monospace;
        }

        /* Video Player Layer */
        #video-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .video-window {
            width: 80%;
            max-width: 900px;
            background: #000;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
            padding: 4px;
        }

        /* Audio Visualization */
        .vu-meter-container {
            display: flex;
            gap: 2px;
            height: 24px;
            align-items: flex-end;
            margin-top: 10px;
            padding-top: 6px;
            border-top: 1px solid #111;
        }
        .vu-bar {
            flex: 1;
            background: #1a1a1a;
            height: 2px;
            transition: height 0.08s ease-out; 
        }
        .vu-bar.active { background: #555; }
        .vu-bar.peak { background: var(--crimson); box-shadow: 0 0 4px var(--crimson); }
        
        /* Pulse Dot class to reuse */
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #991b1b;
            border-radius: 9999px;
            box-shadow: 0 0 8px #991b1b;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="p-8 md:p-24 pb-48 md:pb-24">

    <div id="boot-screen"></div>
    <div class="scanline"></div>

    <!-- Hidden Video Player -->
    <div id="video-overlay">
        <div class="video-window">
            <div class="flex justify-between items-center p-2 text-[10px] bg-zinc-900 border-b border-zinc-800 text-zinc-500">
                <span id="video-title">STREAM: IDLE</span>
                <span id="video-close-btn" class="cursor-pointer text-red-800 hover:text-red-500" onclick="closeVideoPlayer()">[X] CLOSE</span>
            </div>
            <video id="video-player" class="w-full"></video>
        </div>
    </div>

    <!-- Terminal Container -->
    <div id="console-container">
        <div id="console-output"></div>
        <div class="console-input-row">
            <span>ARCH_OS:</span>
            <input type="text" id="console-input" spellcheck="false" autocomplete="off" placeholder="type 'help'...">
        </div>
    </div>

    <!-- Widgets -->
    <div class="widget-box diag-box" id="diag-widget">
        <div class="widget-header">
            <span class="widget-title">SYS_DIAG</span>
            <span id="uptime">UP: 00:00:00</span>
        </div>
        <div id="diag-logs" class="space-y-1 h-32 overflow-hidden opacity-60"></div>
        <div class="mt-2 pt-1 border-t border-[#1a1a1a] flex justify-between">
            <span>CPU: <span id="cpu-load">02%</span></span>
            <span class="hidden md:inline">MEM: 1.4GB</span>
        </div>
    </div>

    <div class="widget-box audio-box" id="audio-widget">
        <div class="widget-header">
            <span class="widget-title">AUDIO</span>
            <span id="current-time" class="text-white opacity-60">0:00</span> 
        </div>
        <div class="flex items-center gap-2 mb-1">
            <div class="status-dot flex-shrink-0"></div>
            <div class="truncate text-white opacity-80" id="track-name">INITIALIZING...</div>
        </div>
        <div class="progress-container" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="audio-controls">
            <button class="audio-btn font-bold text-white" id="play-btn">PLAY</button>
            <button class="audio-btn font-bold" id="skip-btn">SKIP</button>
        </div>
        <div class="vu-meter-container" id="vu-meter"></div>
        <!-- PRELOAD=AUTO is key for snappiness -->
        <audio id="main-audio" crossorigin="anonymous" preload="auto"></audio>
    </div>

    <!-- Main Navigation Content -->
    <main id="app-content" class="max-w-2xl relative z-20 opacity-0">
        <header class="mb-12 md:mb-20">
            <div class="flex items-center gap-3 mb-4 typewriter-line" data-delay="0">
                <div class="status-dot"></div>
                <h1 class="text-white text-xl tracking-tighter glitch-target">ARCHIVE_01</h1>
            </div>
        </header>

        <section class="space-y-8 md:space-y-12">
            <div class="group typewriter-line" data-delay="1600">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">01 / Utilities</span>
                <a href="utilities.html" class="link-item w-full block py-2 text-lg glitch-target">Web Tools</a>
            </div>

            <div class="group typewriter-line" data-delay="2400">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">02 / Visuals</span>
                <a href="galleries.html" class="link-item w-full block py-2 text-lg glitch-target">Gallery</a>
            </div>

            <div class="group typewriter-line" data-delay="3200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">03 / Documentation</span>
                <a href="#" class="link-item w-full block py-2 text-lg glitch-target">Writings</a>
            </div>

            <div class="group typewriter-line" data-delay="4000">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">04 / Network</span>
                <div class="flex flex-wrap items-center gap-x-6 gap-y-3">
                    <a href="https://csfloat.com/stall/76561198136225158" target="_blank" class="link-item py-2 text-sm glitch-target">CSFloat</a>
                    <a href="https://www.inaturalist.org/observations?place_id=any&user_id=jiwt&verifiable=any" target="_blank" class="link-item py-2 text-sm glitch-target">iNaturalist</a>
                    <a href="https://letterboxd.com/Jiwt/" target="_blank" class="link-item py-2 text-sm glitch-target">Letterboxd</a>
                    <a href="https://lighterpack.com/r/lim3hg" target="_blank" class="link-item py-2 text-sm glitch-target">LighterPack</a>
                    <a href="https://www.twitch.tv/Jiwt" target="_blank" class="link-item py-2 text-sm glitch-target">Twitch</a>
                </div>
            </div>
        </section>

        <footer class="mt-24 md:mt-32 pt-8 border-t border-[#111] typewriter-line" data-delay="4800">
            <div class="terminal-cursor" id="terminal-trigger"></div>
            <p class="text-[8px] mt-4 opacity-20">PRESS '~' FOR COMMAND INTERFACE</p>
        </footer>
    </main>

    <script>
        // Use relative paths to ensure it works on GitHub Pages or local servers
        const TRACKS_JSON_URL = "data/tracks.json";
        const FILES_JSON_URL = "data/terminal_files.json";

        let audioTracks = [];
        let virtualFiles = {};
        let currentTrackIndex = 0;
        let siteBootTime = Date.now();
        let audioCtx, analyser, source, dataArray, isAudioContextInitialized = false;
        let userData = { ip: 'CONNECTION_REFUSED', city: 'REDACTED', region: 'REDACTED', isp: 'REDACTED' };

        const mainAudio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const skipBtn = document.getElementById('skip-btn');
        const trackName = document.getElementById('track-name');
        const progressBar = document.getElementById('progress-bar');
        const progressArea = document.getElementById('progress-area');
        const currentTimeDisplay = document.getElementById('current-time');
        const diagLogs = document.getElementById('diag-logs');
        const vuContainer = document.getElementById('vu-meter');
        const consoleContainer = document.getElementById('console-container');
        const consoleInput = document.getElementById('console-input');
        const consoleOutput = document.getElementById('console-output');

        const bootData = [
            "ROM_VER: 1.0.4-LOCKED",
            "CPU_CHECK: [ OK ]",
            "MEM_CHECK: 16384KB [ OK ]",
            "I/O_SUBSYSTEM: READY",
            "MOUNTING_VFS: /dev/null",
            "ESTABLISHING_VIRTUAL_NETWORK_INTERFACE...",
            "MAC_ADDR: 00:1A:2B:3C:4D:5E [ MAPPED ]",
            "INITIALIZING_TCP_IP_STACK_V6...",
            "GATEWAY_HANDSHAKE: 192.168.1.1 [ OK ]",
            "DNS_RESOLVE: archive_nodes.relay [ OK ]",
            "LOADING_UI_FRAMEWORK: TAILWIND_3.x",
            "DECRYPTING_ASSETS: AES-256-CBC",
            "SYN_FLOOD_PROTECTION: ACTIVE",
            "ENCRYPTING_USER_SESSION...",
            "HANDSHAKE: CLOUDFLARE_EDGE [ SUCCESS ]",
            "KERNEL: BOOT_COMPLETE",
            "SUCCESS: ARCHIVE_OS_ONLINE"
        ];

        const systemMessages = [
            "PING_LATENCY: 14ms",
            "SYN_FLOOD_DETECTED: BLOCKED",
            "UPLINK_STABLE: 10Gbps",
            "CACHE_PURGED: 12.4MB",
            "SSH_ATTEMPT: IP_REDACTED [ DENIED ]",
            "HANDSHAKE_COMPLETE: NODE_04",
            "MEMORY_CLEANUP_SUCCESSFUL",
            "SENSORS_CALIBRATED",
            "PACKET_LOSS: 0.00%",
            "FILE_SYSTEM: READ_ONLY",
            "PORT_8080: LISTENING..."
        ];

        function runSystemLog() {
            setInterval(() => {
                if (Math.random() > 0.92) {
                    addDiagLine("HEARTBEAT_DETECTED", "var(--crimson)");
                    setTimeout(() => addDiagLine("USER_DETECTED", "var(--crimson)"), 500);
                } else {
                    const msg = systemMessages[Math.floor(Math.random() * systemMessages.length)];
                    addDiagLine(msg);
                }
            }, 3500);
        }

        const glitchChars = "!@#$%^&*()_+{}:<>?|[]-=/";
        function glitchEffect(element, originalText) {
            let iterations = 0;
            const interval = setInterval(() => {
                element.innerText = originalText.split("").map((char, index) => {
                    if (index < iterations) return originalText[index];
                    return glitchChars[Math.floor(Math.random() * glitchChars.length)];
                }).join("");
                if (iterations >= originalText.length) {
                    clearInterval(interval);
                    element.innerText = originalText;
                }
                iterations += 1/3;
            }, 30);
        }

        function runSiteCorruption() {
            setInterval(() => {
                if (Math.random() > 0.85) {
                    const targets = document.querySelectorAll('.glitch-target');
                    if (targets.length > 0) {
                        const target = targets[Math.floor(Math.random() * targets.length)];
                        glitchEffect(target, target.innerText);
                    }
                }
            }, 800);
        }

        async function fetchUserLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                if (data && !data.error) {
                    userData = {
                        ip: data.ip || 'CONNECTION_REFUSED',
                        city: data.city || 'REDACTED',
                        region: data.region || 'REDACTED',
                        isp: data.org || 'REDACTED'
                    };
                }
            } catch (e) {}
        }

        async function initializeData() {
            addDiagLine("SYNCING_REMOTE_ASSETS...");
            
            // Attempt to load JSON with no-cache to avoid staleness
            const fetchOptions = { cache: "no-store" };

            try {
                // Fetch Tracks
                const tracksRes = await fetch(TRACKS_JSON_URL, fetchOptions);
                if (!tracksRes.ok) throw new Error(`HTTP_${tracksRes.status}`);
                audioTracks = await tracksRes.json();
                addDiagLine("TRACKS_SYNC: [ OK ]");

                // Fetch Virtual Files
                const filesRes = await fetch(FILES_JSON_URL, fetchOptions);
                if (!filesRes.ok) throw new Error(`HTTP_${filesRes.status}`);
                virtualFiles = await filesRes.json();
                addDiagLine("FILES_SYNC: [ OK ]");

                if (audioTracks && audioTracks.length > 0) {
                    loadTrack(0);
                    addDiagLine("REMOTE_SYNC: [ SUCCESS ]");
                } else {
                    throw new Error("EMPTY_TRACKLIST");
                }
            } catch (e) { 
                console.error("Initialization error:", e);
                addDiagLine(`SYNC_ERR: ${e.message.toUpperCase()}`, "var(--crimson)");
                trackName.innerText = "SYNC ERROR";
                
                // Fallback UI indication if data folders are missing
                if (e.message.includes("404")) {
                    addDiagLine("CHECK: DATA/ FOLDER EXISTS?", "var(--crimson)");
                }
            }
        }

        function loadTrack(index) {
            if (!audioTracks || audioTracks.length === 0) return;
            currentTrackIndex = index;
            const track = audioTracks[index];
            if (!track) return;
            
            // Ensure URL is relative to the root if not absolute
            mainAudio.src = track.url;
            mainAudio.load(); 
            trackName.innerText = track.name.toUpperCase();
            progressBar.style.width = '0%';
        }

        function writeToConsole(text, color = "#666") {
            const line = document.createElement('div');
            line.style.color = color;
            line.style.marginBottom = "2px";
            line.innerText = text;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
            return line;
        }

        consoleInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const raw = consoleInput.value.trim();
                const [cmd, arg] = raw.toLowerCase().split(' ');
                consoleInput.value = '';
                writeToConsole(`> ${raw.toUpperCase()}`, "#aaa");

                if (cmd === 'help') writeToConsole("COMMANDS: LIST, OPEN [FILE], WHOAMI, TIMEWARP");
                else if (cmd === 'list') Object.keys(virtualFiles).forEach(f => writeToConsole(` - ${f}`));
                else if (cmd === 'whoami') {
                    writeToConsole(`REMOTE_IP: ${userData.ip}`, "var(--crimson)");
                    writeToConsole(`CITY: ${userData.city.toUpperCase()}`);
                    writeToConsole(`STATUS: TRACKED`);
                }
                else if (cmd === 'timewarp') {
                    writeToConsole("ACTIVATING_TIMEWARP...", "var(--crimson)");
                    setTimeout(() => { openVideo("log clips/oneyear.mp4", "TIMEWARP", true); }, 2000);
                }
                else if (cmd === 'open' && virtualFiles[arg]) {
                    if (virtualFiles[arg].type === 'video') openVideo(virtualFiles[arg].url, arg);
                    else if (virtualFiles[arg].type === 'external') window.open(virtualFiles[arg].url, '_blank');
                    else writeToConsole(`\n${virtualFiles[arg].content}\n`, "var(--terminal-off-white)");
                }
                else writeToConsole("ERR: ACCESS_DENIED");
            }
        });

        function initAudioContext() {
            if (isAudioContextInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(mainAudio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64; 
                analyser.smoothingTimeConstant = 0.8;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isAudioContextInitialized = true;
                updateVUMeter();
            } catch (e) {
                console.error("AudioContext blocked:", e);
                addDiagLine("AUDIO_CTX: BLOCKED", "var(--crimson)");
            }
        }

        const bars = Array.from({length: 12}, () => {
            const b = document.createElement('div');
            b.className = 'vu-bar';
            vuContainer.appendChild(b);
            return b;
        });

        function updateVUMeter() {
            if (isAudioContextInitialized && !mainAudio.paused) {
                analyser.getByteFrequencyData(dataArray);
                bars.forEach((bar, i) => {
                    let val = dataArray[i] / 255;
                    val = Math.pow(val, 1.5);
                    const height = Math.max(2, val * 22);
                    bar.style.height = height + 'px';
                    
                    if (val > 0.8) bar.classList.add('peak');
                    else if (val > 0.2) { bar.classList.add('active'); bar.classList.remove('peak'); }
                    else bar.classList.remove('active', 'peak');
                });
            } else {
                bars.forEach(bar => bar.style.height = '2px');
            }
            requestAnimationFrame(updateVUMeter);
        }

        playBtn.onclick = async () => {
            if (!audioTracks || audioTracks.length === 0) {
                addDiagLine("ERR: NO_MEDIA_LOADED", "var(--crimson)");
                return;
            }
            initAudioContext();
            if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
            
            if (mainAudio.paused) {
                mainAudio.play().then(() => {
                    playBtn.innerText = "PAUSE";
                }).catch(err => {
                    addDiagLine("PLAY_ERR: " + err.message.toUpperCase(), "var(--crimson)");
                });
            } else {
                mainAudio.pause();
                playBtn.innerText = "PLAY";
            }
        };

        skipBtn.onclick = () => {
            if (!audioTracks || audioTracks.length <= 1) return;
            let nextIndex;
            do {
                nextIndex = Math.floor(Math.random() * audioTracks.length);
            } while (nextIndex === currentTrackIndex);
            loadTrack(nextIndex);
            mainAudio.play().then(() => playBtn.innerText = "PAUSE");
        };

        progressArea.onclick = (e) => {
            if (!mainAudio.duration) return;
            const rect = progressArea.getBoundingClientRect();
            mainAudio.currentTime = ((e.clientX - rect.left) / rect.width) * mainAudio.duration;
        };

        function openVideo(url, title, forced = false) {
            document.getElementById('video-title').innerText = `STREAM: ${title.toUpperCase()}`;
            const player = document.getElementById('video-player');
            player.src = url;
            document.getElementById('video-overlay').style.display = 'flex';
            document.getElementById('video-close-btn').style.display = forced ? 'none' : 'inline';
            player.play();
            if (!mainAudio.paused) {
                mainAudio.pause();
                playBtn.innerText = "PLAY";
            }
        }

        function closeVideoPlayer() {
            document.getElementById('video-player').pause();
            document.getElementById('video-overlay').style.display = 'none';
        }

        function addDiagLine(text, color = null) {
            const log = document.createElement('div');
            log.innerText = `> ${text}`;
            if (color) log.style.color = color;
            diagLogs.prepend(log);
            if (diagLogs.children.length > 8) diagLogs.removeChild(diagLogs.lastChild);
        }

        function runBoot() {
            const screen = document.getElementById('boot-screen');
            let i = 0;
            const timer = setInterval(() => {
                if (i < bootData.length) {
                    const line = document.createElement('div');
                    line.className = 'post-line';
                    line.innerText = `[ OK ] ${bootData[i++]}`;
                    screen.appendChild(line);
                } else {
                    clearInterval(timer);
                    setTimeout(() => {
                        screen.style.opacity = '0';
                        setTimeout(() => {
                            screen.remove();
                            document.getElementById('app-content').style.opacity = '1';
                            document.querySelectorAll('.typewriter-line').forEach(line => {
                                setTimeout(() => line.classList.add('typing'), parseInt(line.getAttribute('data-delay')));
                            });
                            document.getElementById('diag-widget').style.opacity = '1';
                            document.getElementById('audio-widget').style.opacity = '1';
                            runSiteCorruption();
                            runSystemLog();
                        }, 400);
                    }, 400);
                }
            }, 45); 
        }

        function toggleTerminal() {
            const visible = consoleContainer.style.display === 'flex';
            consoleContainer.style.display = visible ? 'none' : 'flex';
            if (!visible) setTimeout(() => consoleInput.focus(), 10);
        }

        window.addEventListener('keydown', (e) => { if (e.key === '~' || e.key === '`') { e.preventDefault(); toggleTerminal(); } });
        document.getElementById('terminal-trigger').onclick = toggleTerminal;

        window.onload = () => {
            fetchUserLocation();
            initializeData();
            runBoot();
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - siteBootTime) / 1000);
                document.getElementById('uptime').innerText = `UP: ${String(Math.floor(elapsed / 3600)).padStart(2, '0')}:${String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0')}:${String(elapsed % 60).padStart(2, '0')}`;
                document.getElementById('cpu-load').innerText = `${Math.floor(Math.random() * 4 + 1)}%`;
            }, 1000);
        };

        mainAudio.ontimeupdate = () => {
            if (!mainAudio.duration) return;
            progressBar.style.width = `${(mainAudio.currentTime / mainAudio.duration) * 100}%`;
            const m = Math.floor(mainAudio.currentTime / 60);
            const s = Math.floor(mainAudio.currentTime % 60);
            currentTimeDisplay.innerText = `${m}:${s.toString().padStart(2, '0')}`;
        };

        mainAudio.onended = () => skipBtn.click();
    </script>
</body>
</html>
