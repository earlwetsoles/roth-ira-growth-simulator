<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --crimson: #991b1b;
            --terminal-gray: #666;
            --terminal-off-white: #eee;
            --glitch-color: #ff0000;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: var(--terminal-gray);
            overflow-x: hidden;
        }

        /* CRT Scanline */
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        /* Rapid POST Sequence Overlay */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 500;
            padding: 2rem;
            font-size: 11px;
            color: #444;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: opacity 0.4s ease;
        }

        .post-line {
            line-height: 1.4;
            white-space: nowrap;
        }

        /* Typewriter Animation */
        .typewriter-line {
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            opacity: 0;
        }

        .typing {
            animation: typing-anim 0.8s steps(30, end) forwards;
            opacity: 1;
        }

        @keyframes typing-anim {
            from { width: 0 }
            to { width: 100% }
        }

        /* Link Styling */
        .link-item {
            border-bottom: 1px solid #1a1a1a;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }

        .link-item:hover {
            color: var(--terminal-off-white);
            border-bottom-color: var(--crimson);
            padding-left: 8px;
        }

        /* Widgets */
        .widget-box {
            position: fixed;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 9px;
            z-index: 30;
            color: #444;
            opacity: 0;
            transition: opacity 1s ease;
        }

        @media (min-width: 768px) {
            .widget-box { width: 240px; right: 2rem; }
            .diag-box { top: 2rem; }
            .audio-box { top: 18rem; }
        }

        @media (max-width: 767px) {
            .widget-box { 
                width: 45%; 
                font-size: 8px;
                padding: 6px;
                bottom: 1rem;
            }
            .diag-box { left: 1rem; height: 110px; }
            .audio-box { right: 1rem; height: 130px; }
            #diag-logs { height: 40px !important; }
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 0.25rem;
        }

        .widget-title { color: var(--crimson); font-weight: bold; }
        .progress-container { width: 100%; height: 4px; background: #1a1a1a; margin: 8px 0; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--crimson); width: 0%; transition: width 0.1s linear; pointer-events: none; }
        .audio-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .audio-btn { background: none; border: none; color: #444; cursor: pointer; padding: 0; transition: color 0.2s; }
        .audio-btn:hover { color: var(--terminal-off-white); }

        /* Terminal Cursor Styling */
        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--crimson);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Hidden Terminal Console */
        #console-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid var(--crimson);
            padding: 10px 20px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            font-size: 12px;
            color: var(--terminal-off-white);
            max-height: 40vh;
        }
        
        #console-container.lockdown {
            animation: lockdown-flash 0.5s infinite;
            pointer-events: none;
        }

        @keyframes lockdown-flash {
            0%, 100% { background: #000; border-top-color: var(--crimson); }
            50% { background: #300; border-top-color: #ff0000; }
        }

        #console-output {
            overflow-y: auto;
            margin-bottom: 5px;
            font-size: 10px;
            color: #666;
            max-height: 150px;
        }
        .console-input-row {
            display: flex;
            align-items: center;
        }
        #console-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--terminal-off-white);
            flex-grow: 1;
            margin-left: 10px;
            font-family: 'Space Mono', monospace;
        }

        /* Analog VU Meter */
        .vu-meter-container {
            display: flex;
            gap: 4px;
            height: 20px;
            align-items: flex-end;
            margin-top: 10px;
            padding-top: 6px;
            border-top: 1px solid #111;
        }
        .vu-bar {
            flex: 1;
            background: #1a1a1a;
            height: 2px;
            transition: height 0.05s ease-out; 
        }
        .vu-bar.active {
            background: #555;
        }
        .vu-bar.peak {
            background: var(--crimson);
            box-shadow: 0 0 4px var(--crimson);
        }
    </style>
</head>

                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(mainAudio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                // Lower FFT size for a more "chunky" blocky feel with fewer bars
                analyser.fftSize = 64; 
                analyser.smoothingTimeConstant = 0.75;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                isAudioContextInitialized = true;
            } catch(e) { console.warn("Audio Context blocked or failed."); }

        function updateVUMeter() {
            if (isAudioContextInitialized && !mainAudio.paused) {
                analyser.getByteFrequencyData(dataArray);
                
                // We focus on the first few bins (lower frequencies) for more punchy movement
                // and skip the high frequency noise that often stays static
                for (let i = 0; i < numBars; i++) {
                    const bar = bars[i];
                    // Using a narrowed range of the dataArray (low-to-mid)
                    const val = dataArray[i + 2] || 0; 
                    
                    // Boost sensitivity so movement is more drastic
                    const boost = 1.25;
                    const h = Math.max(2, (val / 255) * 20 * boost);
                    
                    bar.style.height = Math.min(20, h) + 'px';
                    
                    if (val > 30) bar.classList.add('active'); else bar.classList.remove('active');
                    // Peak indicator logic
                    if (val > 200) bar.classList.add('peak'); else bar.classList.remove('peak');
                }

            "VOICE_DATA_RECOVERED", "GEOLOCATION_PINNED", "ACCESS_DENIED_BY_ROOT",
            "REMOTE_SHELL_ESTABLISHED"
        ];

        function runRandomDiag() {
            if (isLockdown) return;
            const msg = diagMessages[Math.floor(Math.random() * diagMessages.length)];
            addLog(msg);

            if (msg === "HEARTBEAT_SIGNAL_STABLE") {
                setTimeout(() => {
                    addLog("UNKNOWN_USER_DETECTED", "#991b1b");
                }, 1500);
            }
            
            if (Math.random() > 0.85) {
                setTimeout(() => {
                    addLog("FATAL: BUFFER_OVERFLOW");
                }, 400);
            }

            setTimeout(runRandomDiag, 1500 + Math.random() * 3500);
        }

        function runPostSequence() {
            const screen = document.getElementById('boot-screen');
            let count = 0;
            const interval = setInterval(() => {
                if (count < bootData.length) {
                    const line = document.createElement('div');
                    line.className = 'post-line';
                    line.innerText = `[ OK ] ${bootData[count++]}`;
                    screen.appendChild(line);
                    screen.scrollTop = screen.scrollHeight;
                } else {
                    clearInterval(interval);
                    setTimeout(revealSite, 300);
                }
            }, 50);
        }

        function revealSite() {
            const screen = document.getElementById('boot-screen');
            const main = document.getElementById('app-content');
            if (screen) screen.style.opacity = '0';
            setTimeout(() => {
                if (screen) screen.remove();
                main.style.opacity = '1';
                document.querySelectorAll('.typewriter-line').forEach(line => {
                    setTimeout(() => line.classList.add('typing'), parseInt(line.getAttribute('data-delay')));
                });
                document.getElementById('diag-widget').style.opacity = '1';
                document.getElementById('audio-widget').style.opacity = '1';
                runRandomDiag();
            }, 400);
        }

        function loadTrack(index) {
            const track = audioTracks[index];
            mainAudio.src = track.url;
            trackName.innerText = track.name.toUpperCase();
            mainAudio.load();
        }

        async function playAudio() {
            initAudioContext();
            if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
            try {
                await mainAudio.play();
                playBtn.innerText = "PAUSE";
                audioStatusText.innerText = "Streaming";
            } catch (e) { console.warn("Playback prevented."); }
        }

        playBtn.onclick = () => {
            if (mainAudio.paused) playAudio();
            else {
                mainAudio.pause();
                playBtn.innerText = "PLAY";
                audioStatusText.innerText = "Paused";
            }
        };

        skipBtn.onclick = () => {
            currentTrackIndex = (currentTrackIndex + 1) % audioTracks.length;
            loadTrack(currentTrackIndex);
            playAudio();
        };

        muteBtn.onclick = () => {
            mainAudio.muted = !mainAudio.muted;
            muteBtn.innerText = mainAudio.muted ? "UNMUTE" : "MUTE";
        };

        function seek(e) {
            if (!mainAudio.duration) return;
            const rect = progressArea.getBoundingClientRect();
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const pos = (clientX - rect.left) / rect.width;
            mainAudio.currentTime = Math.max(0, Math.min(1, pos)) * mainAudio.duration;
        }

        progressArea.addEventListener('mousedown', seek);
        progressArea.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            seek(e);
        });

        mainAudio.ontimeupdate = () => {
            if (!mainAudio.duration) return;
            const pct = (mainAudio.currentTime / mainAudio.duration) * 100;
            progressBar.style.width = `${pct}%`;
            const m = Math.floor(mainAudio.currentTime / 60);
            const s = Math.floor(mainAudio.currentTime % 60);
            currentTimeDisplay.innerText = `${m}:${s.toString().padStart(2, '0')}`;
        };

        window.onload = () => {
            runPostSequence();
            loadTrack(currentTrackIndex);
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - siteBootTime) / 1000);
                document.getElementById('uptime').innerText = `UP: ${String(Math.floor(elapsed / 3600)).padStart(2, '0')}:${String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0')}:${String(elapsed % 60).padStart(2, '0')}`;
                document.getElementById('cpu-load').innerText = `${Math.floor(Math.random() * 15 + 5).toString().padStart(2, '0')}%`;
            }, 1000);
        };
    </script>
</body>
</html>
