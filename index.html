<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVE_01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --crimson: #991b1b;
            --glitch-red: #ff3e3e;
            --terminal-gray: #666;
            --terminal-off-white: #eee;
            --terminal-green: #00ff41;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: var(--terminal-gray);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        /* CRT Overlay Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .glitch-hover-effect {
            display: inline-block;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .glitch-hover-effect:hover {
            color: var(--glitch-red) !important;
            text-shadow: 2px 0 #00ff41, -2px 0 blue;
            border-color: var(--glitch-red) !important;
        }

        #boot-screen {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 500;
            padding: 2rem;
            font-size: 11px;
            color: #444;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Glitch Effect CSS from Framework */
        .typewriter-line {
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            opacity: 0;
        }

        .typing {
            animation: typing-anim 0.8s steps(25, end) forwards;
            opacity: 1;
        }

        @keyframes typing-anim {
            from { width: 0 }
            to { width: 100% }
        }

        .glitch-target {
            transition: color 0.1s ease;
        }

        .widget-box {
            position: fixed;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 9px;
            z-index: 30;
            color: #444;
            opacity: 0;
            transition: opacity 1s ease;
        }

        @media (min-width: 768px) {
            .widget-box { width: 240px; right: 2rem; }
            .diag-box { top: 2rem; }
            .audio-box { top: 18rem; }
        }

        @media (max-width: 767px) {
            .widget-box { width: 45%; font-size: 8px; padding: 6px; bottom: 1rem; }
            .diag-box { left: 1rem; height: 110px; }
            .audio-box { right: 1rem; height: 130px; }
        }

        .widget-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 0.25rem; }
        .widget-title { color: var(--crimson); font-weight: bold; }
        
        .progress-container { width: 100%; height: 4px; background: #1a1a1a; margin: 8px 0; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--crimson); width: 0%; pointer-events: none; }
        
        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--crimson);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .terminal-cursor:hover {
            background-color: var(--glitch-red);
            box-shadow: 2px 0 #00ff41, -2px 0 blue;
        }
        
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }

        #console-container {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: #000;
            border-top: 1px solid var(--crimson);
            padding: 10px 20px;
            z-index: 10000;
            display: none;
            flex-direction: column;
            font-size: 12px;
            color: var(--terminal-off-white);
            max-height: 50vh;
        }

        #console-output { overflow-y: auto; margin-bottom: 5px; font-size: 10px; color: #666; max-height: 250px; }
        .console-input-row { display: flex; align-items: center; }
        #console-input { background: transparent; border: none; outline: none; color: var(--terminal-off-white); flex-grow: 1; margin-left: 10px; font-family: 'Space Mono', monospace; }

        .vu-meter-container { display: flex; gap: 2px; height: 20px; align-items: flex-end; margin-top: 10px; padding-top: 6px; border-top: 1px solid #111; }
        .vu-bar { flex: 1; background: #1a1a1a; height: 2px; transition: height 0.08s ease-out; }
        
        .status-dot { width: 8px; height: 8px; background-color: var(--crimson); border-radius: 9999px; box-shadow: 0 0 8px var(--crimson); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        .link-item { border-bottom: 1px solid #1a1a1a; display: inline-block; cursor: pointer; }

        #video-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 20000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .video-window {
            width: 90%;
            max-width: 900px;
            background: #000;
            border: 1px solid #222;
            padding: 4px;
        }
        .video-header {
            background: #111;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            border-bottom: 1px solid #222;
            margin-bottom: 4px;
        }

        .diag-entry {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            width: 100%;
        }
        .diag-entry.type-normal { color: var(--terminal-gray); }
        .diag-entry.type-good { color: var(--terminal-green); }
        .diag-entry.type-bad { color: var(--crimson); }
    </style>
</head>
<body class="p-8 md:p-24 pb-48 md:pb-24">

    <div id="boot-screen"></div>

    <div id="video-overlay">
        <div class="video-window">
            <div class="video-header">
                <span id="video-title">STREAMING_LOG...</span>
                <span onclick="closeVideo()" class="cursor-pointer text-red-700 font-bold glitch-hover-effect">[X] CLOSE</span>
            </div>
            <video id="video-player" style="width:100%" controls></video>
        </div>
    </div>

    <div id="console-container">
        <div id="console-output"></div>
        <div class="console-input-row">
            <span>ARCH_OS:</span>
            <input type="text" id="console-input" spellcheck="false" autocomplete="off" placeholder="type 'help'...">
        </div>
    </div>

    <div class="widget-box diag-box" id="diag-widget">
        <div class="widget-header">
            <span class="widget-title">SYS_DIAG</span>
            <span id="uptime">UP: 00:00:00</span>
        </div>
        <div id="diag-logs" class="space-y-1 h-32 overflow-hidden opacity-60"></div>
        <div class="mt-2 pt-1 border-t border-[#1a1a1a] flex justify-between">
            <span>CPU: <span id="cpu-load">02%</span></span>
            <span class="hidden md:inline">MEM: 1.4GB</span>
        </div>
    </div>

    <div class="widget-box audio-box" id="audio-widget">
        <div class="widget-header">
            <span class="widget-title">AUDIO</span>
            <span id="current-time" class="text-white opacity-60">0:00</span> 
        </div>
        <div class="flex items-center gap-2 mb-1">
            <div class="status-dot flex-shrink-0"></div>
            <div class="truncate text-white opacity-80 glitch-target" id="track-name">INITIALIZING...</div>
        </div>
        <div class="progress-container" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="flex justify-between items-center mt-2">
            <button class="glitch-hover-effect text-[10px] text-white" id="play-btn">PLAY</button>
            <button class="glitch-hover-effect text-[10px] text-white" id="skip-btn">SKIP</button>
        </div>
        <div class="vu-meter-container" id="vu-meter"></div>
        <audio id="main-audio" crossorigin="anonymous"></audio>
    </div>

    <main id="app-content" class="max-w-2xl relative z-20 opacity-0">
        <header class="mb-12 md:mb-20">
            <div class="flex items-center gap-3 mb-4 typewriter-line" data-delay="0">
                <div class="status-dot"></div>
                <h1 class="text-white text-xl tracking-tighter glitch-target">ARCHIVE_01</h1>
            </div>
        </header>

        <section class="space-y-8 md:space-y-12">
            <div class="group typewriter-line" data-delay="800">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">01 / Utilities</span>
                <a href="utilities.html" class="link-item glitch-hover-effect w-full block py-2 text-lg glitch-target">Web Tools</a>
            </div>

            <div class="group typewriter-line" data-delay="1600">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">02 / Visuals</span>
                <a href="galleries.html" class="link-item glitch-hover-effect w-full block py-2 text-lg glitch-target">Gallery</a>
            </div>

            <div class="group typewriter-line" data-delay="2400">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">ALBUM_XX / PENDING</span>
                <span class="block py-2 text-lg italic opacity-20">[ENCRYPTED_DATA]</span>
            </div>

            <div class="group typewriter-line" data-delay="3200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">04 / Network</span>
                <div class="flex flex-wrap items-center gap-x-6 gap-y-3">
                    <a href="https://csfloat.com/stall/76561198136225158" target="_blank" class="link-item glitch-hover-effect py-2 text-sm glitch-target">CSFloat</a>
                    <a href="https://www.inaturalist.org/observations?place_id=any&user_id=jiwt&verifiable=any" target="_blank" class="link-item glitch-hover-effect py-2 text-sm glitch-target">iNaturalist</a>
                    <a href="https://letterboxd.com/Jiwt/" target="_blank" class="link-item glitch-hover-effect py-2 text-sm glitch-target">Letterboxd</a>
                    <a href="https://lighterpack.com/r/lim3hg" target="_blank" class="link-item glitch-hover-effect py-2 text-sm glitch-target">LighterPack</a>
                    <a href="https://www.twitch.tv/Jiwt" target="_blank" class="link-item glitch-hover-effect py-2 text-sm glitch-target">Twitch</a>
                </div>
            </div>
        </section>

        <footer class="mt-24 md:mt-32 pt-8 border-t border-[#111] typewriter-line" data-delay="4000">
            <div class="terminal-cursor" id="terminal-trigger"></div>
            <p class="text-[8px] mt-4 opacity-20 glitch-target">PRESS '~' FOR COMMAND INTERFACE</p>
        </footer>
    </main>

    <script>
        const TRACKS_JSON_URL = "data/tracks.json";
        const FILES_JSON_URL = "data/terminal_files.json";

        let audioTracks = [];
        let virtualFiles = {};
        let currentTrackIndex = 0;
        let siteBootTime = Date.now();
        let warpOffset = 0; 
        let audioCtx, analyser, source, dataArray, isAudioCtxInit = false;

        const mainAudio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const skipBtn = document.getElementById('skip-btn');
        const trackNameDisplay = document.getElementById('track-name');
        const progressBar = document.getElementById('progress-bar');
        const progressArea = document.getElementById('progress-area');
        const currentTimeDisplay = document.getElementById('current-time');
        const diagLogs = document.getElementById('diag-logs');
        const vuContainer = document.getElementById('vu-meter');
        const consoleContainer = document.getElementById('console-container');
        const consoleInput = document.getElementById('console-input');
        const consoleOutput = document.getElementById('console-output');
        const videoOverlay = document.getElementById('video-overlay');
        const videoPlayer = document.getElementById('video-player');
        const videoTitle = document.getElementById('video-title');

        const bootData = [
            "INITIALIZING_KERNEL_0.9.4... [OK]",
            "MOUNTING_LOCAL_STORAGE... [OK]",
            "ALLOCATING_BUFFER_AT_OFFSET_0XFFFFF80000000000...",
            "KERNEL_PANIC_PREVENTION_ACTIVE",
            "SYNCING_LOCAL_FILESYSTEM...",
            "SUCCESS: ARCHIVE_OS_ONLINE"
        ];

        const fakeStatuses = [
            "PACKET_RECEIVED_10.0.0.1",
            "TEMP_CORE_0: 42°C",
            "HEARTBEAT_PULSE_SYNCING",
            "PING_LATENCY: 14ms",
            "MEMORY_PAGE_FLUSHED"
        ];

        // --- Glitch Effect Framework Implementation ---
        const GLITCH_CONFIG = { 
            className: '.glitch-target',    
            chars: '!@#$%^&*()_+[]{}<>?/', 
            frames: 10,                    
            frameSpeed: 60,                
            intervalMin: 500,              
            intervalMax: 3000              
        }; 

        function runGlitchEffect() { 
            const targets = document.querySelectorAll(GLITCH_CONFIG.className); 
            if (targets.length === 0) return; 

            const target = targets[Math.floor(Math.random() * targets.length)]; 
            const originalText = target.innerText; 
            let iterations = 0; 

            const interval = setInterval(() => { 
                target.innerText = originalText 
                    .split('') 
                    .map((char) => { 
                        if (char === ' ' || char === '\n') return char; 
                        return GLITCH_CONFIG.chars[Math.floor(Math.random() * GLITCH_CONFIG.chars.length)]; 
                    }) 
                    .join(''); 

                if (iterations++ > GLITCH_CONFIG.frames) { 
                    clearInterval(interval); 
                    target.innerText = originalText; 
                } 
            }, GLITCH_CONFIG.frameSpeed); 

            const nextTick = Math.random() * (GLITCH_CONFIG.intervalMax - GLITCH_CONFIG.intervalMin) + GLITCH_CONFIG.intervalMin; 
            setTimeout(runGlitchEffect, nextTick); 
        } 

        window.addEventListener('DOMContentLoaded', () => {
            const lines = document.querySelectorAll('.typewriter-line');
            lines.forEach(line => {
                const delay = parseInt(line.getAttribute('data-delay')) || 0;
                setTimeout(() => { 
                    line.classList.add('typing'); 
                }, delay);
            });
            setTimeout(runGlitchEffect, 2000);
        });

        // --- Audio & System Logic ---
        async function initializeData() {
            try {
                const [tRes, fRes] = await Promise.all([
                    fetch(TRACKS_JSON_URL).then(r => r.json()).catch(() => []),
                    fetch(FILES_JSON_URL).then(r => r.json()).catch(() => ({}))
                ]);
                audioTracks = tRes;
                virtualFiles = fRes;
                if (audioTracks.length > 0) {
                    currentTrackIndex = Math.floor(Math.random() * audioTracks.length);
                    loadTrack(currentTrackIndex);
                }
                addDiagLine("DATA_SYNC_SUCCESS", "good");
            } catch (e) { 
                addDiagLine("DATA_SYNC_ERROR", "bad");
            }
        }

        function loadTrack(index) {
            const track = audioTracks[index];
            if (!track) return;
            trackNameDisplay.innerText = track.name.toUpperCase();
            mainAudio.src = track.url;
            mainAudio.load();
        }

        playBtn.onclick = async () => {
            if (!isAudioCtxInit) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    source = audioCtx.createMediaElementSource(mainAudio);
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    analyser.fftSize = 64;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    isAudioCtxInit = true;
                    requestAnimationFrame(updateVUMeter);
                } catch(e) { console.error("AudioContext init failed", e); }
            }
            if (mainAudio.paused) {
                mainAudio.play().catch(err => { addDiagLine("PLAY_ERROR", "bad"); });
                playBtn.innerText = "PAUSE";
            } else {
                mainAudio.pause();
                playBtn.innerText = "PLAY";
            }
        };

        skipBtn.onclick = () => {
            if (audioTracks.length > 1) {
                currentTrackIndex = Math.floor(Math.random() * audioTracks.length);
                loadTrack(currentTrackIndex);
                mainAudio.play().catch(() => {});
                playBtn.innerText = "PAUSE";
                addDiagLine("SHUFFLE_QUEUE_RANDOMIZED");
            }
        };

        mainAudio.ontimeupdate = () => {
            if (!mainAudio.duration) return;
            const progress = (mainAudio.currentTime / mainAudio.duration) * 100;
            progressBar.style.width = `${progress}%`;
            const m = Math.floor(mainAudio.currentTime / 60);
            const s = Math.floor(mainAudio.currentTime % 60);
            currentTimeDisplay.innerText = `${m}:${s.toString().padStart(2, '0')}`;
        };

        progressArea.onclick = (e) => {
            if (!mainAudio.duration) return;
            const rect = progressArea.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            mainAudio.currentTime = pos * mainAudio.duration;
        };

        const bars = Array.from({length: 12}, () => {
            const b = document.createElement('div');
            b.className = 'vu-bar';
            vuContainer.appendChild(b);
            return b;
        });

        function updateVUMeter() {
            if (isAudioCtxInit && !mainAudio.paused) {
                analyser.getByteFrequencyData(dataArray);
                bars.forEach((bar, i) => {
                    const val = dataArray[i * 2] || 0;
                    bar.style.height = Math.max(2, (val / 255) * 18) + 'px';
                    bar.style.backgroundColor = val > 200 ? 'var(--glitch-red)' : '#333';
                });
            }
            requestAnimationFrame(updateVUMeter);
        }

        function writeToConsole(text, color = "#666") {
            const line = document.createElement('div');
            line.style.color = color;
            line.innerText = text;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        consoleInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const raw = consoleInput.value.trim();
                const parts = raw.split(' ');
                const cmd = parts[0].toLowerCase();
                const arg = parts.slice(1).join(' ');
                consoleInput.value = '';
                writeToConsole(`> ${raw.toUpperCase()}`, "#aaa");
                
                if (cmd === 'list') {
                    const files = Object.keys(virtualFiles);
                    files.length === 0 ? writeToConsole("NO FILES DETECTED") : files.forEach(f => writeToConsole(`- ${f}`));
                } else if (cmd === 'open') {
                    const fileObj = virtualFiles[arg] || virtualFiles[arg.toLowerCase()];
                    if (fileObj) {
                        if (fileObj.type === 'video') {
                            videoTitle.innerText = `LOG_STREAM: ${arg.toUpperCase()}`;
                            videoPlayer.src = fileObj.url;
                            videoOverlay.style.display = 'flex';
                            videoPlayer.play();
                            mainAudio.pause();
                            playBtn.innerText = "PLAY";
                        } else if (fileObj.type === 'external') {
                            window.open(fileObj.url, '_blank');
                        }
                    } else writeToConsole("ERR: FILE_NOT_FOUND");
                } else if (cmd === 'timewarp') {
                    videoTitle.innerText = "EVENT_LOG: TIMEWARP";
                    videoPlayer.src = "log clips/oneyear.mp4";
                    videoOverlay.style.display = 'flex';
                    videoPlayer.play();
                    mainAudio.pause();
                    playBtn.innerText = "PLAY";
                    writeToConsole("INITIATING_TEMPORAL_SHIFT...");
                } else if (cmd === 'help') {
                    writeToConsole("LIST, OPEN [FILE], TIMEWARP");
                }
            }
        });

        function closeVideo() {
            videoPlayer.pause();
            videoPlayer.src = "";
            videoOverlay.style.display = 'none';
        }

        function addDiagLine(text, type = 'normal') {
            const log = document.createElement('div');
            log.className = `diag-entry type-${type}`;
            log.innerText = `> ${text}`;
            diagLogs.prepend(log);
            if (diagLogs.children.length > 20) diagLogs.lastChild.remove();
        }

        function runBoot() {
            const screen = document.getElementById('boot-screen');
            let i = 0;
            const timer = setInterval(() => {
                if (i < bootData.length) {
                    const line = document.createElement('div');
                    line.innerText = `[ OK ] ${bootData[i++]}`;
                    screen.appendChild(line);
                    screen.scrollTop = screen.scrollHeight;
                } else {
                    clearInterval(timer);
                    setTimeout(() => {
                        screen.remove();
                        document.getElementById('app-content').style.opacity = '1';
                        document.getElementById('diag-widget').style.opacity = '1';
                        document.getElementById('audio-widget').style.opacity = '1';
                        setInterval(() => {
                            addDiagLine(fakeStatuses[Math.floor(Math.random() * fakeStatuses.length)]);
                        }, 2500);
                    }, 500);
                }
            }, 80);
        }

        const toggleConsole = () => {
            const isVisible = consoleContainer.style.display === 'flex';
            consoleContainer.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible) consoleInput.focus();
        };

        window.addEventListener('keydown', (e) => { 
            if (e.key === '~' || e.key === '`') { e.preventDefault(); toggleConsole(); } 
        });

        document.getElementById('terminal-trigger').onclick = (e) => {
            e.stopPropagation(); toggleConsole();
        };

        window.onload = () => {
            initializeData();
            runBoot();
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - siteBootTime) / 1000) + warpOffset;
                const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
                const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                document.getElementById('uptime').innerText = `UP: ${h}:${m}:${s}`;
                document.getElementById('cpu-load').innerText = `${Math.floor(Math.random() * 8 + 1)}%`;
            }, 1000);
        };
    </script>
</body>
</html>
