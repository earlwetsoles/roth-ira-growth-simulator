<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --crimson: #991b1b;
            --terminal-gray: #666;
            --terminal-off-white: #eee;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: var(--terminal-gray);
            overflow-x: hidden;
        }

        /* CRT Scanline */
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 40;
            pointer-events: none;
            opacity: 0.3;
        }

        .link-item {
            border-bottom: 1px solid #1a1a1a;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }

        .link-item:hover {
            color: var(--terminal-off-white);
            border-bottom-color: var(--crimson);
            padding-left: 8px;
        }

        .link-item-full {
            width: 100%;
        }

        ::selection {
            background: var(--crimson);
            color: white;
        }

        /* Typewriter Classes */
        .typewriter-line {
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            opacity: 0;
        }

        .typing {
            animation: typing-anim 0.8s steps(25, end) forwards;
            opacity: 1;
        }

        @keyframes typing-anim {
            from { width: 0 }
            to { width: 100% }
        }

        /* Widget Container Styles (Matching Diagnostics) */
        .widget-box {
            position: fixed;
            right: 2rem;
            width: 240px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 9px;
            z-index: 30;
            color: #444;
        }

        .diag-box {
            top: 2rem;
        }

        .audio-box {
            top: 18rem; /* Positioned below diagnostics */
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 0.25rem;
        }

        .widget-title {
            color: var(--crimson);
            font-weight: bold;
        }

        /* Audio Player Specifics */
        .progress-container {
            width: 100%;
            height: 2px;
            background: #1a1a1a;
            margin: 8px 0;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--crimson);
            width: 0%;
        }

        .audio-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .audio-btn {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }

        .audio-btn:hover {
            color: var(--terminal-off-white);
        }
    </style>
</head>
<body class="p-8 md:p-24">

    <div class="scanline"></div>

    <!-- Diagnostics Terminal -->
    <div class="widget-box diag-box hidden md:block">
        <div class="widget-header">
            <span class="widget-title">SYS_DIAG</span>
            <span id="uptime">UP: 00:00:00</span>
        </div>
        <div id="diag-logs" class="space-y-1 h-32 overflow-hidden opacity-60"></div>
        <div class="mt-2 pt-1 border-t border-[#1a1a1a] flex justify-between">
            <span>CPU: <span id="cpu-load">02%</span></span>
            <span>MEM: 1.4GB</span>
        </div>
    </div>

    <!-- Audio Player Module -->
    <div class="widget-box audio-box hidden md:block">
        <div class="widget-header">
            <span class="widget-title">AUDIO_MODULE</span>
            <span id="track-index">01/01</span>
        </div>
        <div class="mb-1 truncate text-white opacity-80" id="track-name">NO_MEDIA_LOADED</div>
        <div class="progress-container" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="flex justify-between items-center text-[8px] opacity-40">
            <span id="current-time">0:00</span>
            <span id="total-duration">0:00</span>
        </div>
        <div class="audio-controls">
            <button class="audio-btn" id="prev-btn">PREV</button>
            <button class="audio-btn font-bold text-white" id="play-btn">PLAY</button>
            <button class="audio-btn" id="next-btn">NEXT</button>
            <button class="audio-btn" id="shuffle-btn">SHUFFLE</button>
        </div>
        <audio id="main-audio" src=""></audio>
    </div>

    <main class="max-w-2xl relative z-20">
        <!-- Header -->
        <header class="mb-20">
            <div class="flex items-center gap-3 mb-4 typewriter-line" data-delay="200">
                <div class="w-2 h-2 bg-red-800 rounded-full shadow-[0_0_8px_#991b1b] animate-pulse"></div>
                <h1 class="text-white text-xl tracking-tighter">ARCHIVE_01</h1>
            </div>
            <p class="text-sm leading-relaxed max-w-md italic typewriter-line" data-delay="1000">
                A collection of things I've put online.
            </p>
        </header>

        <!-- Links Section -->
        <section class="space-y-12">
            
            <div class="group typewriter-line" data-delay="2200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">01 / Utilities</span>
                <a href="utilities.html" class="link-item link-item-full block py-2 text-lg">Web Tools</a>
            </div>

            <div class="group typewriter-line" data-delay="3200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">02 / Text</span>
                <a href="#" class="link-item link-item-full block py-2 text-lg">Writings</a>
            </div>

            <div class="group typewriter-line" data-delay="4200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">03 / Media</span>
                <a href="#" class="link-item link-item-full block py-2 text-lg">Photos</a>
            </div>

            <div class="group typewriter-line" data-delay="5200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">04 / LINKS</span>
                <div class="flex items-center gap-6">
                    <a href="https://steamcommunity.com/id/Jiwt/" target="_blank" rel="noopener noreferrer" class="link-item py-2 text-sm hover:text-red-700">Steam</a>
                    <a href="https://www.twitch.tv/jiwt" target="_blank" rel="noopener noreferrer" class="link-item py-2 text-sm hover:text-red-700">Twitch</a>
                </div>
            </div>

        </section>

        <!-- Footer -->
        <footer class="mt-32 pt-8 border-t border-[#111] typewriter-line" data-delay="6200">
            <p class="text-[10px] uppercase tracking-widest opacity-20">
                End of line.
            </p>
        </footer>
    </main>

    <script>
        // AUDIO TRACK CONFIGURATION
        // EDIT THIS SECTION: Replace 'your-file-name.mp3' with the actual filenames you uploaded.
        // The 'name' is what users see on the player.
        const audioTracks = [
            { name: "TRACK_NAME_01", url: "audio/03 JFMAMJJASOND.mp3" },
            { name: "TRACK_NAME_02", url: "audio/02. A Partridge & A Pear Tree (Feat. Tha God Fahim) (Prod. By Sage Elsesser).mp3" },
            { name: "TRACK_NAME_03", url: "audio/06 Wingarium Leviosa (Advanced Listening).mp3" }
            { name: "TRACK_NAME_04", url: "audio/06. DNA Swab (Feat. Tha God Fahim) (Prod. By Earl Sweatshirt).mp3" }
            { name: "TRACK_NAME_05", url: "audio/10. Long Time (Prod. By Alchemist).mp3" }
            { name: "TRACK_NAME_06", url: "audio/01 Mario Lemieuxx.mp3" }
            { name: "TRACK_NAME_07", url: "audio/01. Rale Bulgarian (Prod. By Sadhu Gold).mp3" }
            { name: "TRACK_NAME_08", url: "audio/02 Fromaj feat. JuJu Gotti.mp3" }
            { name: "TRACK_NAME_09", url: "audio/02. A Partridge & A Pear Tree (Feat. Tha God Fahim) (Prod. By Sage Elsesser).mp3" }
        ];

        let currentTrackIndex = 0;
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const trackName = document.getElementById('track-name');
        const trackIndexDisplay = document.getElementById('track-index');
        const progressBar = document.getElementById('progress-bar');
        const progressArea = document.getElementById('progress-area');
        const currentTimeEl = document.getElementById('current-time');
        const totalDurationEl = document.getElementById('total-duration');

        function loadTrack(index) {
            if(!audioTracks[index]) return;
            const track = audioTracks[index];
            audio.src = track.url;
            trackName.innerText = track.name.toUpperCase();
            trackIndexDisplay.innerText = `${(index + 1).toString().padStart(2, '0')}/${audioTracks.length.toString().padStart(2, '0')}`;
            audio.load();
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "PAUSE";
            } else {
                audio.pause();
                playBtn.innerText = "PLAY";
            }
        }

        function updateProgress() {
            const { duration, currentTime } = audio;
            const percent = (currentTime / duration) * 100;
            progressBar.style.width = `${percent}%`;
            
            const formatTime = (time) => {
                if (isNaN(time)) return "0:00";
                const mins = Math.floor(time / 60);
                const secs = Math.floor(time % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };
            
            currentTimeEl.innerText = formatTime(currentTime);
            totalDurationEl.innerText = formatTime(duration);
        }

        playBtn.addEventListener('click', togglePlay);
        document.getElementById('next-btn').addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex + 1) % audioTracks.length;
            loadTrack(currentTrackIndex);
            audio.play();
            playBtn.innerText = "PAUSE";
        });
        document.getElementById('prev-btn').addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex - 1 + audioTracks.length) % audioTracks.length;
            loadTrack(currentTrackIndex);
            audio.play();
            playBtn.innerText = "PAUSE";
        });
        document.getElementById('shuffle-btn').addEventListener('click', () => {
            currentTrackIndex = Math.floor(Math.random() * audioTracks.length);
            loadTrack(currentTrackIndex);
            audio.play();
            playBtn.innerText = "PAUSE";
        });
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', () => document.getElementById('next-btn').click());
        progressArea.addEventListener('click', (e) => {
            const width = progressArea.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        });

        if(audioTracks.length > 0) loadTrack(0);

        window.addEventListener('DOMContentLoaded', () => {
            const lines = document.querySelectorAll('.typewriter-line');
            lines.forEach(line => {
                const delay = parseInt(line.getAttribute('data-delay'));
                setTimeout(() => { line.classList.add('typing'); }, delay);
            });

            let startTime = Date.now();
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
                const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                const uptimeEl = document.getElementById('uptime');
                if(uptimeEl) uptimeEl.innerText = `UP: ${h}:${m}:${s}`;
                const cpu = document.getElementById('cpu-load');
                if(cpu) cpu.innerText = `${Math.floor(Math.random() * 15 + 1).toString().padStart(2, '0')}%`;
            }, 1000);

            const logContainer = document.getElementById('diag-logs');
            const logMessages = ["INIT_PROTOCOL_HUB_01", "QUERYING_DATABASE...", "ACCESS_GRANTED", "SYNC_UTC_LOCAL", "ENCRYPTING_TUNNEL...", "PACKET_RECV: 104b", "CLEANUP_TEMP_FILES", "STATUS: NOMINAL"];
            setInterval(() => {
                if(!logContainer) return;
                const log = document.createElement('div');
                log.innerText = `> ${logMessages[Math.floor(Math.random() * logMessages.length)]}`;
                logContainer.prepend(log);
                if (logContainer.children.length > 8) logContainer.removeChild(logContainer.lastChild);
            }, 3000);
        });
    </script>
</body>
</html>
