<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVE_01</title>
    
    <!-- FAVICON SETTINGS -->
    <link rel="apple-touch-icon" sizes="180x180" href="data/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="data/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="data/icons/favicon-16x16.png">
    <link rel="shortcut icon" href="data/icons/favicon.ico">
    <link rel="manifest" href="data/icons/site.webmanifest">
    <meta name="theme-color" content="#050505">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --crimson: #991b1b;
            --glitch-red: #ff3e3e;
            --terminal-gray: #666;
            --terminal-off-white: #eee;
            --terminal-green: #00ff41;
            --widget-w: 240px;
            --widget-gap: 10px;
            --top-row-h: 135px; 
            --art-size: 135px;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: var(--terminal-gray);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .glitch-hover-effect {
            display: inline-block;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .glitch-hover-effect:hover {
            color: var(--glitch-red) !important;
            text-shadow: 2px 0 #00ff41, -2px 0 blue;
            border-color: var(--glitch-red) !important;
        }

        #boot-screen {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 500;
            padding: 2rem;
            font-size: 11px;
            color: #444;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .typewriter-line {
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            opacity: 0;
        }

        .typing {
            animation: typing-anim 0.8s steps(25, end) forwards;
            opacity: 1;
        }

        @keyframes typing-anim {
            from { width: 0 }
            to { width: 100% }
        }

        .glitch-target {
            transition: color 0.1s ease;
        }

        .widget-box {
            position: fixed;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 9px;
            z-index: 30;
            color: #444;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .hidden-widget { display: none !important; }

        @media (min-width: 768px) {
            .widget-box { width: var(--widget-w); right: 2rem; }
            .diag-box { top: 2rem; }
            .audio-box { top: 18rem; right: 2rem; height: var(--top-row-h); width: var(--widget-w); }
            .art-box-borderless { 
                position: fixed;
                top: 18rem; 
                right: calc(2rem + var(--widget-w) + var(--widget-gap)); 
                width: var(--art-size); 
                height: var(--art-size); 
                z-index: 30;
                opacity: 0;
                transition: opacity 1s ease;
                display: none;
                overflow: hidden;
            } 
            .video-widget-box { 
                top: calc(18rem + var(--top-row-h) + var(--widget-gap)); 
                right: 2rem; 
                width: calc(var(--widget-w) + var(--art-size) + var(--widget-gap));
            }
        }

        @media (max-width: 767px) {
            .widget-box { width: 45%; font-size: 8px; padding: 6px; }
            .diag-box { left: 1rem; top: 1rem; height: 110px; }
            .audio-box { right: 1rem; top: 1rem; height: 130px; }
            .art-box-borderless { position: fixed; right: 1rem; top: 10rem; width: 80px; height: 80px; display: none; }
            .video-widget-box { left: 1rem; top: 18rem; width: 90%; }
        }

        .widget-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 0.25rem; }
        .widget-title { color: var(--crimson); font-weight: bold; }
        
        .progress-container { width: 100%; height: 4px; background: #1a1a1a; margin: 8px 0; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--crimson); width: 0%; pointer-events: none; }
        
        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--crimson);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }

        #console-container {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: #000;
            border-top: 1px solid var(--crimson);
            padding: 10px 20px;
            z-index: 10000;
            display: none;
            flex-direction: column;
            font-size: 12px;
            color: var(--terminal-off-white);
            max-height: 50vh;
        }

        #console-output { overflow-y: auto; margin-bottom: 5px; font-size: 10px; color: #666; max-height: 250px; }
        .console-input-row { display: flex; align-items: center; }
        #console-input { background: transparent; border: none; outline: none; color: var(--terminal-off-white); flex-grow: 1; margin-left: 10px; font-family: 'Space Mono', monospace; }

        .vu-meter-container { display: flex; gap: 2px; height: 32px; align-items: flex-end; margin-top: 8px; padding-top: 4px; border-top: 1px solid #111; }
        .vu-bar { flex: 1; background: #1a1a1a; height: 2px; transition: height 0.08s ease-out; }
        
        .status-dot { width: 8px; height: 8px; background-color: var(--crimson); border-radius: 9999px; box-shadow: 0 0 8px var(--crimson); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        .link-item { border-bottom: 1px solid #1a1a1a; display: inline-block; cursor: pointer; }

        #video-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 20000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .video-window {
            width: 90%;
            max-width: 900px;
            background: #000;
            border: 1px solid #222;
            padding: 4px;
        }
        .video-header {
            background: #111;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            border-bottom: 1px solid #222;
            margin-bottom: 4px;
        }

        .media-container {
            width: 100%;
            background: #000;
            border: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .video-display { aspect-ratio: 16/9; width: 100%; }

        #cover-art-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.4) contrast(1.1);
        }
        #mini-video-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.4) contrast(1.2);
        }

        #video-player {
            width: 100%;
            max-height: 80vh;
            object-fit: contain; 
            background: #000;
        }

        .diag-entry { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; width: 100%; }
        .diag-entry.type-normal { color: var(--terminal-gray); }
        .diag-entry.type-good { color: var(--terminal-green); }
        .diag-entry.type-bad { color: var(--crimson); }
    </style>
</head>
<body class="p-8 md:p-24 pb-48 md:pb-24">

    <div id="boot-screen"></div>

    <div id="video-overlay">
        <div class="video-window">
            <div class="video-header">
                <span id="video-title">STREAMING_LOG...</span>
                <span onclick="closeVideo()" class="cursor-pointer text-red-700 font-bold glitch-hover-effect">[X] CLOSE</span>
            </div>
            <video id="video-player" style="width:100%" controls muted></video>
        </div>
    </div>

    <div id="console-container">
        <div id="console-output"></div>
        <div class="console-input-row">
            <span>ARCH_OS:</span>
            <input type="text" id="console-input" spellcheck="false" autocomplete="off" placeholder="type 'help'...">
        </div>
    </div>

    <div class="widget-box diag-box" id="diag-widget">
        <div class="widget-header">
            <span class="widget-title">SYS_DIAG</span>
            <span id="uptime">UP: 00:00:00</span>
        </div>
        <div id="diag-logs" class="space-y-1 h-32 overflow-hidden opacity-60"></div>
        <div class="mt-2 pt-1 border-t border-[#1a1a1a] flex justify-between">
            <span>CPU: <span id="cpu-load">02%</span></span>
            <span class="hidden md:inline">MEM: 1.4GB</span>
        </div>
    </div>

    <div class="widget-box audio-box" id="audio-widget">
        <div class="widget-header">
            <span class="widget-title">AUDIO</span>
            <span id="current-time" class="text-white opacity-60">0:00</span> 
        </div>
        <div class="flex items-center gap-2 mb-1">
            <div class="status-dot flex-shrink-0"></div>
            <div class="truncate text-white opacity-80 glitch-target" id="track-name">INITIALIZING...</div>
        </div>
        <div class="progress-container" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="flex justify-between items-center mt-2">
            <button class="glitch-hover-effect text-[10px] text-white" id="play-btn">PLAY</button>
            <button class="glitch-hover-effect text-[10px] text-white" id="skip-btn">SKIP</button>
        </div>
        <div class="vu-meter-container" id="vu-meter"></div>
        <audio id="main-audio" crossorigin="anonymous"></audio>
    </div>

    <div class="art-box-borderless" id="art-widget">
        <img id="cover-art-img" src="" alt="Cover Art" style="display: none;">
        <div id="art-placeholder" class="text-[8px] opacity-20 flex items-center justify-center h-full bg-[#0a0a0a]">NO_IMG</div>
    </div>

    <div class="widget-box video-widget-box hidden-widget" id="video-widget">
        <div class="widget-header">
            <span class="widget-title">VIDEO_FEED</span>
            <span class="opacity-40">MP4_STREAM_16:9</span>
        </div>
        <div class="media-container video-display">
            <video id="mini-video-player" muted playsinline loop style="display: none;"></video>
            <div id="video-placeholder" class="text-[8px] opacity-20">SIGNAL_LOST</div>
        </div>
    </div>

    <main id="app-content" class="max-w-2xl relative z-20 opacity-0">
        <header class="mb-12 md:mb-20">
            <div class="flex items-center gap-3 mb-4 typewriter-line" data-delay="0">
                <div class="status-dot"></div>
                <h1 class="text-white text-xl tracking-tighter glitch-target">ARCHIVE_01</h1>
            </div>
        </header>

        <section class="space-y-8 md:space-y-12">
            <div class="group typewriter-line" data-delay="800">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">01 / Utilities</span>
                <a href="utilities.html" class="link-item glitch-hover-effect w-full block py-2 text-lg glitch-target">Web Tools</a>
            </div>

            <div class="group typewriter-line" data-delay="1600">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">02 / Visuals</span>
                <a href="galleries.html" class="link-item glitch-hover-effect w-full block py-2 text-lg glitch-target">Gallery</a>
            </div>

            <div class="group typewriter-line" data-delay="2400">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">ALBUM_XX / PENDING</span>
                <span class="block py-2 text-lg italic opacity-20">[ENCRYPTED_DATA]</span>
            </div>

            <div class="group typewriter-line" data-delay="3200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">04 / Network</span>
                <div id="network-links-container" class="flex flex-wrap items-center gap-x-6 gap-y-3">
                </div>
            </div>
        </section>

        <footer class="mt-24 md:mt-32 pt-8 border-t border-[#111] typewriter-line" data-delay="4000">
            <div class="terminal-cursor" id="terminal-trigger"></div>
            <p class="text-[8px] mt-4 opacity-20 glitch-target">PRESS '~' FOR COMMAND INTERFACE</p>
        </footer>
    </main>

    <script>
        const TRACKS_JSON_URL = "data/tracks.json";
        const FILES_JSON_URL = "data/terminal_files.json";
        const BOOT_JSON_URL = "data/boot_sequence.json";
        const STATUS_JSON_URL = "data/system_status.json";
        const COMMANDS_JSON_URL = "data/commands.json";
        const NETWORK_LINKS_URL = "data/network_links.json";

        let audioTracks = [];
        let playQueue = [];
        let queueCursor = 0;
        let siteBootTime = Date.now();
        let warpOffset = 0;
        let audioCtx, analyser, source, dataArray, isAudioCtxInit = false;
        let artworkFirstShow = true;
        
        let virtualFiles = {};
        let bootSequenceData = [];
        let systemStatusMessages = [];
        let commandRegistry = {};

        const mainAudio = document.getElementById('main-audio');
        const miniVideo = document.getElementById('mini-video-player');
        const playBtn = document.getElementById('play-btn');
        const skipBtn = document.getElementById('skip-btn');
        const trackNameDisplay = document.getElementById('track-name');
        const progressBar = document.getElementById('progress-bar');
        const progressArea = document.getElementById('progress-area');
        const currentTimeDisplay = document.getElementById('current-time');
        const diagLogs = document.getElementById('diag-logs');
        const vuContainer = document.getElementById('vu-meter');
        const consoleContainer = document.getElementById('console-container');
        const consoleInput = document.getElementById('console-input');
        const consoleOutput = document.getElementById('console-output');
        const videoOverlay = document.getElementById('video-overlay');
        const videoPlayer = document.getElementById('video-player');
        const videoTitle = document.getElementById('video-title');
        const artImg = document.getElementById('cover-art-img');
        const artPlaceholder = document.getElementById('art-placeholder');
        const artWidget = document.getElementById('art-widget');
        const videoWidget = document.getElementById('video-widget');
        const videoPlaceholder = document.getElementById('video-placeholder');

        const GLITCH_CONFIG = { className: '.glitch-target', chars: '!@#$%^&*()_+[]{}<>?/', frames: 10, frameSpeed: 60, intervalMin: 500, intervalMax: 3000 }; 

        function runGlitchEffect() { 
            const targets = document.querySelectorAll(GLITCH_CONFIG.className); 
            if (targets.length === 0) return; 
            const target = targets[Math.floor(Math.random() * targets.length)]; 
            const originalText = target.innerText; 
            let iterations = 0; 
            const interval = setInterval(() => { 
                target.innerText = originalText.split('').map(char => (char === ' ' || char === '\n') ? char : GLITCH_CONFIG.chars[Math.floor(Math.random() * GLITCH_CONFIG.chars.length)]).join(''); 
                if (iterations++ > GLITCH_CONFIG.frames) { clearInterval(interval); target.innerText = originalText; } 
            }, GLITCH_CONFIG.frameSpeed); 
            setTimeout(runGlitchEffect, Math.random() * (GLITCH_CONFIG.intervalMax - GLITCH_CONFIG.intervalMin) + GLITCH_CONFIG.intervalMin); 
        } 

        function initAppAnimations() {
            const lines = document.querySelectorAll('.typewriter-line');
            lines.forEach(line => {
                const delay = parseInt(line.getAttribute('data-delay')) || 0;
                setTimeout(() => { line.classList.add('typing'); }, delay);
            });
            setTimeout(runGlitchEffect, 1000);
        }

        async function initializeData() {
            try {
                const [tRes, fRes, bRes, sRes, cRes, nRes] = await Promise.all([
                    fetch(TRACKS_JSON_URL).then(r => r.json()).catch(() => []),
                    fetch(FILES_JSON_URL).then(r => r.json()).catch(() => ({})),
                    fetch(BOOT_JSON_URL).then(r => r.json()).catch(() => ["BOOT_ERR"]),
                    fetch(STATUS_JSON_URL).then(r => r.json()).catch(() => ["SYS_IDLE"]),
                    fetch(COMMANDS_JSON_URL).then(r => r.json()).catch(() => ({})),
                    fetch(NETWORK_LINKS_URL).then(r => r.json()).catch(() => [])
                ]);
                
                audioTracks = tRes;
                virtualFiles = fRes;
                bootSequenceData = bRes;
                systemStatusMessages = sRes;
                commandRegistry = cRes;
                
                const linkContainer = document.getElementById('network-links-container');
                nRes.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.target = "_blank";
                    a.className = "link-item glitch-hover-effect py-2 text-sm glitch-target";
                    a.innerText = link.name;
                    linkContainer.appendChild(a);
                });

                if (audioTracks.length > 0) {
                    generateQueue();
                    loadTrack(playQueue[queueCursor]);
                }
                addDiagLine("DATA_SYNC_SUCCESS", "good");
                runBoot();
            } catch (e) { 
                runBoot();
            }
        }

        function generateQueue() {
            playQueue = Array.from({length: audioTracks.length}, (_, i) => i);
            for (let i = playQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [playQueue[i], playQueue[j]] = [playQueue[j], playQueue[i]];
            }
            queueCursor = 0;
        }

        function loadTrack(index) {
            const track = audioTracks[index];
            if (!track) return;
            trackNameDisplay.innerText = track.name.toUpperCase();
            mainAudio.src = track.url;
            
            if (track.artwork && track.artwork.trim() !== "") {
                artImg.src = track.artwork;
                artImg.style.display = "block";
                artPlaceholder.style.display = "none";
            } else {
                artImg.style.display = "none";
                artPlaceholder.style.display = "block";
            }

            if (track.video && track.video.trim() !== "") {
                miniVideo.src = track.video;
                miniVideo.style.display = 'block';
                videoPlaceholder.style.display = 'none';
                if (!artworkFirstShow) {
                    videoWidget.classList.remove('hidden-widget');
                    videoWidget.style.opacity = '1';
                    if (!mainAudio.paused) miniVideo.play();
                }
            } else {
                videoWidget.classList.add('hidden-widget');
                videoWidget.style.opacity = '0';
                miniVideo.pause();
                miniVideo.src = "";
            }

            mainAudio.load();
        }

        playBtn.onclick = async () => {
            if (artworkFirstShow) {
                artWidget.style.display = "block";
                setTimeout(() => { artWidget.style.opacity = "1"; }, 50);
                artworkFirstShow = false;
                const track = audioTracks[playQueue[queueCursor]];
                if (track && track.video) {
                    videoWidget.classList.remove('hidden-widget');
                    videoWidget.style.opacity = '1';
                }
            }

            if (!isAudioCtxInit) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    source = audioCtx.createMediaElementSource(mainAudio);
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    analyser.fftSize = 64;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    isAudioCtxInit = true;
                    requestAnimationFrame(updateVUMeter);
                } catch(e) {}
            }

            if (mainAudio.paused) {
                mainAudio.play().catch(() => {});
                if (miniVideo.src) miniVideo.play();
                playBtn.innerText = "PAUSE";
            } else {
                mainAudio.pause();
                miniVideo.pause();
                playBtn.innerText = "PLAY";
            }
        };

        skipBtn.onclick = () => {
            if (audioTracks.length > 0) {
                queueCursor++;
                if (queueCursor >= playQueue.length) generateQueue();
                loadTrack(playQueue[queueCursor]);
                mainAudio.play().catch(() => {});
                if (miniVideo.src) miniVideo.play();
                playBtn.innerText = "PAUSE";
            }
        };

        mainAudio.onended = () => { skipBtn.onclick(); };

        mainAudio.ontimeupdate = () => {
            if (!mainAudio.duration) return;
            progressBar.style.width = `${(mainAudio.currentTime / mainAudio.duration) * 100}%`;
            const m = Math.floor(mainAudio.currentTime / 60);
            const s = Math.floor(mainAudio.currentTime % 60);
            currentTimeDisplay.innerText = `${m}:${s.toString().padStart(2, '0')}`;
        };

        progressArea.onclick = (e) => {
            if (!mainAudio.duration) return;
            const seekTime = ((e.clientX - progressArea.getBoundingClientRect().left) / progressArea.offsetWidth) * mainAudio.duration;
            mainAudio.currentTime = seekTime;
            if (miniVideo.src) {
                miniVideo.currentTime = seekTime;
            }
        };

        const bars = Array.from({length: 12}, () => {
            const b = document.createElement('div');
            b.className = 'vu-bar';
            vuContainer.appendChild(b);
            return b;
        });

        function updateVUMeter() {
            if (isAudioCtxInit && !mainAudio.paused) {
                analyser.getByteFrequencyData(dataArray);
                bars.forEach((bar, i) => {
                    const val = dataArray[i * 2] || 0;
                    bar.style.height = Math.max(2, (val / 255) * 32) + 'px';
                });
            }
            requestAnimationFrame(updateVUMeter);
        }

        function writeToConsole(text, color = "#666") {
            const line = document.createElement('div');
            line.style.color = color;
            line.innerText = text;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        consoleInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const raw = consoleInput.value.trim();
                const parts = raw.split(' ');
                const cmd = parts[0].toLowerCase();
                const arg = parts.slice(1).join(' ');
                consoleInput.value = '';
                writeToConsole(`> ${raw.toUpperCase()}`, "#aaa");
                
                if (!commandRegistry[cmd]) {
                    writeToConsole(`ERR: COMMAND_${cmd.toUpperCase()}_NOT_RECOGNIZED`);
                    return;
                }

                switch(cmd) {
                    case 'timewarp':
                        videoTitle.innerText = "TIMEWARP_SEQUENCE";
                        // Pointing to your specific video in 'log clips'
                        videoPlayer.src = "log clips/intro_sequence.mp4"; 
                        videoOverlay.style.display = 'flex';
                        videoPlayer.play();
                        
                        // Pause existing audio/video background feeds
                        mainAudio.pause();
                        if (miniVideo.src) miniVideo.pause();
                        playBtn.innerText = "PLAY";
                        
                        writeToConsole("INITIATING_TIMEWARP...", "var(--terminal-green)");
                        break;
                    case 'list':
                        Object.keys(virtualFiles).forEach(f => writeToConsole(`- ${f}`));
                        break;
                    case 'open':
                        const fileObj = virtualFiles[arg] || virtualFiles[arg.toLowerCase()];
                        if (fileObj) {
                            if (fileObj.type === 'video') {
                                videoTitle.innerText = `LOG_STREAM: ${arg.toUpperCase()}`;
                                videoPlayer.src = fileObj.url;
                                videoOverlay.style.display = 'flex';
                                videoPlayer.play();
                                mainAudio.pause();
                                miniVideo.pause();
                                playBtn.innerText = "PLAY";
                            } else if (fileObj.type === 'external') {
                                window.open(fileObj.url, '_blank');
                            }
                        } else writeToConsole("ERR: FILE_NOT_FOUND");
                        break;
                    case 'clear':
                        consoleOutput.innerHTML = '';
                        break;
                    case 'help':
                        Object.entries(commandRegistry).forEach(([name, meta]) => {
                            writeToConsole(`${name.toUpperCase()}: ${meta.description}`);
                        });
                        break;
                }
            }
        });

        videoPlayer.onended = () => {
            closeVideo();
        };

        function closeVideo() {
            videoPlayer.pause();
            videoPlayer.src = "";
            videoOverlay.style.display = 'none';
        }

        function addDiagLine(text, type = 'normal') {
            const log = document.createElement('div');
            log.className = `diag-entry type-${type}`;
            log.innerText = `> ${text}`;
            diagLogs.prepend(log);
            if (diagLogs.children.length > 15) diagLogs.lastChild.remove();
        }

        function runBoot() {
            const screen = document.getElementById('boot-screen');
            let i = 0;
            const timer = setInterval(() => {
                if (i < bootSequenceData.length) {
                    const line = document.createElement('div');
                    line.innerText = `[ OK ] ${bootSequenceData[i++]}`;
                    screen.appendChild(line);
                    screen.scrollTop = screen.scrollHeight;
                } else {
                    clearInterval(timer);
                    setTimeout(() => {
                        screen.remove();
                        document.getElementById('app-content').style.opacity = '1';
                        document.getElementById('diag-widget').style.opacity = '1';
                        document.getElementById('audio-widget').style.opacity = '1';
                        initAppAnimations();
                        setInterval(() => { 
                            if(systemStatusMessages.length) {
                                addDiagLine(systemStatusMessages[Math.floor(Math.random() * systemStatusMessages.length)]); 
                            }
                        }, 3000);
                    }, 500);
                }
            }, 50);
        }

        const toggleConsole = () => {
            const isVisible = consoleContainer.style.display === 'flex';
            consoleContainer.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible) consoleInput.focus();
        };

        window.addEventListener('keydown', (e) => { if (e.key === '~' || e.key === '`') { e.preventDefault(); toggleConsole(); } });
        document.getElementById('terminal-trigger').onclick = (e) => { e.stopPropagation(); toggleConsole(); };

        window.onload = () => {
            initializeData();
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - siteBootTime) / 1000) + warpOffset;
                document.getElementById('uptime').innerText = `UP: ${String(Math.floor(elapsed / 3600)).padStart(2, '0')}:${String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0')}:${String(elapsed % 60).padStart(2, '0')}`;
                document.getElementById('cpu-load').innerText = `${Math.floor(Math.random() * 5 + 1)}%`;
            }, 1000);
        };
    </script>
</body>
</html>
