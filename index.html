<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --crimson: #991b1b;
            --terminal-gray: #666;
            --terminal-off-white: #eee;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: var(--terminal-gray);
            overflow-x: hidden;
            /* overflow-y hidden until boot finishes */
        }

        /* CRT Scanline */
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        /* Rapid POST Sequence Overlay */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 500;
            padding: 2rem;
            font-size: 11px;
            color: #444;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: opacity 0.4s ease;
        }

        .post-line {
            line-height: 1.4;
            white-space: nowrap;
        }

        /* Typewriter Animation */
        .typewriter-line {
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            opacity: 0;
        }

        .typing {
            animation: typing-anim 0.8s steps(30, end) forwards;
            opacity: 1;
        }

        @keyframes typing-anim {
            from { width: 0 }
            to { width: 100% }
        }

        /* Link Styling */
        .link-item {
            border-bottom: 1px solid #1a1a1a;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }

        .link-item:hover {
            color: var(--terminal-off-white);
            border-bottom-color: var(--crimson);
            padding-left: 8px;
        }

        /* Widgets */
        .widget-box {
            position: fixed;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 9px;
            z-index: 30;
            color: #444;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* Desktop Positioning */
        @media (min-width: 768px) {
            .widget-box { width: 240px; right: 2rem; }
            .diag-box { top: 2rem; }
            .audio-box { top: 18rem; }
        }

        /* Mobile Positioning: Tucked in the corners at the bottom to stay out of center */
        @media (max-width: 767px) {
            .widget-box { 
                width: 45%; 
                font-size: 8px;
                padding: 6px;
                bottom: 1rem;
            }
            .diag-box { left: 1rem; height: 110px; }
            .audio-box { right: 1rem; height: 110px; }
            
            /* Hide non-essential logs on small screens to save space */
            #diag-logs { height: 40px !important; }
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 0.25rem;
        }

        .widget-title { color: var(--crimson); font-weight: bold; }
        .progress-container { width: 100%; height: 2px; background: #1a1a1a; margin: 8px 0; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--crimson); width: 0%; transition: width 0.1s linear; }
        .audio-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .audio-btn { background: none; border: none; color: #444; cursor: pointer; padding: 0; transition: color 0.2s; }
        .audio-btn:hover { color: var(--terminal-off-white); }

        /* Terminal Cursor Styling */
        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--crimson);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="p-8 md:p-24 pb-48 md:pb-24">

    <div id="boot-screen"></div>
    <div class="scanline"></div>

    <div class="widget-box diag-box" id="diag-widget">
        <div class="widget-header">
            <span class="widget-title">SYS_DIAG</span>
            <span id="uptime">UP: 00:00:00</span>
        </div>
        <div id="diag-logs" class="space-y-1 h-32 overflow-hidden opacity-60"></div>
        <div class="mt-2 pt-1 border-t border-[#1a1a1a] flex justify-between">
            <span>CPU: <span id="cpu-load">02%</span></span>
            <span class="hidden md:inline">MEM: 1.4GB</span>
        </div>
    </div>

    <div class="widget-box audio-box" id="audio-widget">
        <div class="widget-header">
            <span class="widget-title">AUDIO</span>
            <span id="current-time" class="text-white opacity-60">0:00</span> 
        </div>
        <div class="mb-1 truncate text-white opacity-80" id="track-name">READY_TO_BOOT</div>
        <div class="progress-container" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        
        <div class="audio-controls">
            <div class="hidden md:flex items-center gap-2">
                <div id="audio-status-dot" class="w-1.5 h-1.5 bg-red-800 rounded-full animate-pulse"></div>
                <span id="audio-status-text" class="text-[7px] uppercase tracking-tighter opacity-50">Safe Mode</span>
            </div>
            <div class="flex gap-2 md:gap-4 w-full md:w-auto justify-between md:justify-end">
                <button class="audio-btn font-bold text-white" id="play-btn">PLAY</button>
                <button class="audio-btn font-bold" id="skip-btn">SKIP</button>
                <button class="audio-btn hidden md:block" id="mute-btn">MUTE</button>
            </div>
        </div>
        <audio id="main-audio" preload="auto"></audio>
    </div>

    <main id="app-content" class="max-w-2xl relative z-20 opacity-0">
        <header class="mb-12 md:mb-20">
            <div class="flex items-center gap-3 mb-4 typewriter-line" data-delay="0">
                <div class="w-2 h-2 bg-red-800 rounded-full shadow-[0_0_8px_#991b1b] animate-pulse"></div>
                <h1 class="text-white text-xl tracking-tighter">ARCHIVE_01</h1>
            </div>
            <p class="text-sm leading-relaxed max-w-md italic typewriter-line" data-delay="800">
                A collection of digital artifacts and logs.
            </p>
        </header>

        <section class="space-y-8 md:space-y-12">
            <div class="group typewriter-line" data-delay="1600">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">01 / Utilities</span>
                <a href="utilities.html" target="_blank" rel="noopener noreferrer" class="link-item w-full block py-2 text-lg">Web Tools</a>
            </div>

            <div class="group typewriter-line" data-delay="2400">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">02 / Documentation</span>
                <a href="#" class="link-item w-full block py-2 text-lg">Writings</a>
            </div>

            <div class="group typewriter-line" data-delay="3200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">03 / Visuals</span>
                <a href="galleries.html" class="link-item w-full block py-2 text-lg">Gallery</a>
            </div>

            <div class="group typewriter-line" data-delay="4000">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">04 / Network</span>
                <div class="flex flex-wrap items-center gap-x-6 gap-y-3">
                    <a href="https://csfloat.com/stall/76561198136225158" target="_blank" class="link-item py-2 text-sm">CSFloat</a>
                    <a href="https://letterboxd.com/Jiwt" target="_blank" class="link-item py-2 text-sm">Letterboxd</a>
                    <a href="https://lighterpack.com/r/lim3hg" target="_blank" class="link-item py-2 text-sm">LighterPack</a>
                    <a href="https://steamcommunity.com/id/Jiwt/" target="_blank" class="link-item py-2 text-sm">Steam</a>
                    <a href="https://www.twitch.tv/jiwt" target="_blank" class="link-item py-2 text-sm">Twitch</a>
                </div>
            </div>
        </section>

        <footer class="mt-24 md:mt-32 pt-8 border-t border-[#111] typewriter-line" data-delay="4800">
            <div class="terminal-cursor"></div>
        </footer>
    </main>

    <script>
        const bootData = [
            "Initializing BIOS...", "Verifying CPU...", "Memory Test: 16384MB OK",
            "SATA Primary Master: 500GB SSD", "USB Controller Initialized...",
            "Network Card Found [MAC: 00:1A:2B:3C:4D:5E]", "DHCP Handshake... OK",
            "Loading Kernel ARCH_OS_01...", "Mounting /dev/sda1...",
            "Encryption Layer: AES-256 Enabled", "Checking Archive Integrity...",
            "Checksum 0xAF43... PASSED", "Loading UI Assets...",
            "Starting Media Engine...", "Redirecting I/O...",
            "SUCCESS: System Boot Sequence Complete."
        ];

        function runPostSequence() {
            const screen = document.getElementById('boot-screen');
            if (!screen) return;
            let count = 0;
            const interval = setInterval(() => {
                if (count < bootData.length) {
                    const line = document.createElement('div');
                    line.className = 'post-line';
                    line.innerText = `[ OK ] ${bootData[count]}`;
                    screen.appendChild(line);
                    screen.scrollTop = screen.scrollHeight;
                    count++;
                } else {
                    clearInterval(interval);
                    setTimeout(revealSite, 300);
                }
            }, 50);
        }

        function revealSite() {
            const screen = document.getElementById('boot-screen');
            const main = document.getElementById('app-content');
            if (screen) screen.style.opacity = '0';
            setTimeout(() => {
                if (screen) screen.remove();
                document.body.style.overflowY = 'auto';
                main.style.opacity = '1';
                document.querySelectorAll('.typewriter-line').forEach(line => {
                    setTimeout(() => line.classList.add('typing'), parseInt(line.getAttribute('data-delay')));
                });
                document.getElementById('diag-widget').style.opacity = '1';
                document.getElementById('audio-widget').style.opacity = '1';
            }, 400);
        }

        const audioTracks = [
            { name: "MARIO LEMIEUXX", url: "audio/01 Mario Lemieuxx.mp3" },
            { name: "RALE BULGARIAN", url: "audio/01. Rale Bulgarian (Prod. By Sadhu Gold).mp3" },
            { name: "A PARTRIDGE & A PEAR TREE", url: "audio/02. A Partridge & A Pear Tree (Feat. Tha God Fahim) (Prod. By Sage Elsesser).mp3" },
            { name: "FROMAJ", url: "audio/02 Fromaj feat. JuJu Gotti.mp3" },
            { name: "JFMAMJJASOND", url: "audio/03 JFMAMJJASOND.mp3" },
            { name: "SO MUCH MORE", url: "audio/03. So Much More (Prod. By Alchemist).mp3" },
            { name: "ALLEN IVERSON", url: "audio/04. Allen Iverson (Feat. Heem Stogied) (Prod. By Earl Sweatshirt).mp3" },
            { name: "WINGARIUM LEVIOSA", url: "audio/06 Wingarium Leviosa (Advanced Listening).mp3" },
            { name: "DNA SWAB", url: "audio/06. DNA Swab (Feat. Tha God Fahim) (Prod. By Earl Sweatshirt).mp3" },
            { name: "MAC FLURRIES", url: "audio/08. Mac Flurries (Feat. Heem Stogied) (Prod. By Sage Elsesser).mp3" },
            { name: "LONG TIME", url: "audio/10. Long Time (Prod. By Alchemist).mp3" },
            { name: "RORSHACH'S", url: "audio/11. Rorshach's (Feat. Tha God Fahim) (Prod. By Sage Elsesser).mp3" },
            { name: "AIRWORKS", url: "audio/12 Airworks.mp3" },
            { name: "DON'T CRY", url: "audio/18 Don't Cry.mp3" },
            { name: "GOBSTOPPER", url: "audio/22 Gobstopper.mp3" },
            { name: "BYE..", url: "audio/29 Bye..mp3" },
            { name: "LAST DONUT OF THE NIGHT", url: "audio/30 Last Donut of the Night.mp3" },
            { name: "DONUTS (INTRO)", url: "audio/31 Donuts (Intro).mp3" },
            { name: "I PROMISE YA", url: "audio/I Promise Ya.mp3" },
            { name: "SPRAY 4 ME", url: "audio/Gucci Mane - Spray 4 Me (Prod By DPBEATS).mp3" },
            { name: "IT JUST DOESNT MATTER", url: "audio/07 - It Just Doesnt Matter.mp3" },
            { name: "INSIDE OUTSIDE", url: "audio/01 - Inside Outside.wav.mp3" },
            { name: "SWITCHIN LANES", url: "audio/switchin lanes.mp3" },
            { name: "12 BARS", url: "audio/01 - 12 Bars (DatPiff Exclusive).mp3" },
            { name: "MORGAN TRACY", url: "audio/03 - Morgan Tracy (DatPiff Exclusive).mp3" },
            { name: "FUCK ME", url: "audio/06 - Fuck Me (DatPiff Exclusive).mp3" }
        ];

        let currentTrackIndex = Math.floor(Math.random() * audioTracks.length);
        const mainAudio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const skipBtn = document.getElementById('skip-btn');
        const trackName = document.getElementById('track-name');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeDisplay = document.getElementById('current-time');
        const muteBtn = document.getElementById('mute-btn');
        const audioStatusText = document.getElementById('audio-status-text');

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function loadTrack(index) {
            const track = audioTracks[index];
            if (!track) return;
            
            mainAudio.pause();
            mainAudio.currentTime = 0;
            progressBar.style.width = '0%';
            
            mainAudio.src = track.url;
            trackName.innerText = track.name.toUpperCase();
            mainAudio.load();
        }

        async function skipToRandom() {
            let nextIndex;
            if (audioTracks.length > 1) {
                do {
                    nextIndex = Math.floor(Math.random() * audioTracks.length);
                } while (nextIndex === currentTrackIndex);
            } else {
                nextIndex = 0;
            }
            
            currentTrackIndex = nextIndex;
            loadTrack(currentTrackIndex);
            
            try {
                await mainAudio.play();
                playBtn.innerText = "PAUSE";
                if (audioStatusText) audioStatusText.innerText = "Streaming";
            } catch (e) {
                console.warn("Playback prevented:", e);
                playBtn.innerText = "PLAY";
                if (audioStatusText) audioStatusText.innerText = "Ready";
            }
        }

        playBtn.onclick = async () => {
            if (mainAudio.paused) {
                try {
                    if (!mainAudio.src || mainAudio.src === window.location.href) {
                        loadTrack(currentTrackIndex);
                    }
                    await mainAudio.play();
                    playBtn.innerText = "PAUSE";
                    if (audioStatusText) audioStatusText.innerText = "Streaming";
                } catch (e) {
                    console.error("Playback block:", e);
                    if (audioStatusText) audioStatusText.innerText = "Click Play";
                }
            } else {
                mainAudio.pause();
                playBtn.innerText = "PLAY";
                if (audioStatusText) audioStatusText.innerText = "Paused";
            }
        };

        skipBtn.onclick = () => skipToRandom();

        muteBtn.onclick = () => {
            mainAudio.muted = !mainAudio.muted;
            muteBtn.innerText = mainAudio.muted ? "UNMUTE" : "MUTE";
        };

        mainAudio.ontimeupdate = () => {
            if (isNaN(mainAudio.duration) || mainAudio.duration === 0) return;
            const progress = (mainAudio.currentTime / mainAudio.duration) * 100;
            progressBar.style.width = `${progress}%`;
            currentTimeDisplay.innerText = formatTime(mainAudio.currentTime);
        };

        mainAudio.onerror = () => {
            console.error("Error loading audio track:", audioTracks[currentTrackIndex].url);
            if (audioStatusText) audioStatusText.innerText = "Error Loading";
        };

        mainAudio.onended = () => skipToRandom();

        document.getElementById('progress-area').onclick = (e) => {
            if (isNaN(mainAudio.duration) || mainAudio.duration === 0) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            mainAudio.currentTime = pos * mainAudio.duration;
        };

        window.addEventListener('DOMContentLoaded', () => {
            runPostSequence();
            loadTrack(currentTrackIndex);

            let startTime = Date.now();
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
                const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                document.getElementById('uptime').innerText = `UP: ${h}:${m}:${s}`;
                document.getElementById('cpu-load').innerText = `${Math.floor(Math.random() * 8 + 1).toString().padStart(2, '0')}%`;
            }, 1000);

            setInterval(() => {
                const log = document.createElement('div');
                log.innerText = `> ${["INIT_CORE", "QUERY_DB", "AUTH_GRNT", "STATUS_OK"][Math.floor(Math.random()*4)]}`;
                const container = document.getElementById('diag-logs');
                container.prepend(log);
                if (container.children.length > 8) container.removeChild(container.lastChild);
            }, 3000);
        });
    </script>
</body>
</html>
