<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVE_01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --crimson: #991b1b;
            --terminal-gray: #666;
            --terminal-off-white: #eee;
            --glitch-color: #ff0000;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: var(--terminal-gray);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        /* NEW Scanline Effect using pseudo-element */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; 
            left: 0; 
            bottom: 0; 
            right: 0;
            /* Create horizontal black lines every 2px + subtle RGB vertical bars */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none; /* Crucial so you can still click things underneath */
        }

        /* RGB Fuzz Hover Effect */
        .glitch-text {
            display: inline-block;
            transition: color 0.2s;
        }

        .glitch-text:hover {
            color: #ff3e3e; /* Turns the text red */
            /* Adds the green and blue "fuzz" offsets */
            text-shadow: 2px 0 #00ff41, -2px 0 blue; 
        }

        /* Red Border/Text Transition */
        .red-hover {
            transition: all 0.2s ease;
        }

        .red-hover:hover {
            color: #ff3e3e !important;
            border-color: #ff3e3e !important;
            padding-left: 8px;
        }

        /* Boot Screen Sequence */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 500;
            padding: 2rem;
            font-size: 11px;
            color: #444;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: opacity 0.4s ease;
        }

        .post-line {
            line-height: 1.4;
            white-space: nowrap;
        }

        /* Animation Classes */
        .typewriter-line {
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            opacity: 0;
        }

        .typing {
            animation: typing-anim 0.8s steps(30, end) forwards;
            opacity: 1;
        }

        @keyframes typing-anim {
            from { width: 0 }
            to { width: 100% }
        }

        /* Sidebar Widgets */
        .widget-box {
            position: fixed;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 9px;
            z-index: 30;
            color: #444;
            opacity: 0;
            transition: opacity 1s ease;
        }

        @media (min-width: 768px) {
            .widget-box { width: 240px; right: 2rem; }
            .diag-box { top: 2rem; }
            .audio-box { top: 18rem; }
        }

        @media (max-width: 767px) {
            .widget-box { 
                width: 45%; 
                font-size: 8px;
                padding: 6px;
                bottom: 1rem;
            }
            .diag-box { left: 1rem; height: 110px; }
            .audio-box { right: 1rem; height: 130px; }
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 0.25rem;
        }

        .widget-title { color: var(--crimson); font-weight: bold; }
        
        /* Audio Player Styling */
        .progress-container { width: 100%; height: 4px; background: #1a1a1a; margin: 8px 0; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--crimson); width: 0%; transition: width 0.1s linear; pointer-events: none; }
        .audio-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .audio-btn { background: none; border: none; color: #444; cursor: pointer; padding: 0; transition: color 0.2s; }
        .audio-btn:hover { color: var(--terminal-off-white); }

        /* Terminal UI Components */
        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--crimson);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            cursor: pointer;
        }
        
        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        #console-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid var(--crimson);
            padding: 10px 20px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            font-size: 12px;
            color: var(--terminal-off-white);
            max-height: 50vh;
        }

        #console-output {
            overflow-y: auto;
            margin-bottom: 5px;
            font-size: 10px;
            color: #666;
            max-height: 250px;
        }

        .console-input-row { display: flex; align-items: center; }
        
        #console-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--terminal-off-white);
            flex-grow: 1;
            margin-left: 10px;
            font-family: 'Space Mono', monospace;
        }

        /* Video Player Layer */
        #video-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .video-window {
            width: 80%;
            max-width: 900px;
            background: #000;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
            padding: 4px;
        }

        /* Audio Visualization */
        .vu-meter-container {
            display: flex;
            gap: 2px;
            height: 20px;
            align-items: flex-end;
            margin-top: 10px;
            padding-top: 6px;
            border-top: 1px solid #111;
        }
        .vu-bar {
            flex: 1;
            background: #1a1a1a;
            height: 2px;
            transition: height 0.08s ease-out; 
        }
        .vu-bar.active { background: #555; }
        .vu-bar.peak { background: var(--crimson); box-shadow: 0 0 4px var(--crimson); }
        
        /* Pulse Dot class to reuse */
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #991b1b;
            border-radius: 9999px;
            box-shadow: 0 0 8px #991b1b;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="p-8 md:p-24 pb-48 md:pb-24">

    <div id="boot-screen"></div>

    <!-- Hidden Video Player -->
    <div id="video-overlay">
        <div class="video-window">
            <div class="flex justify-between items-center p-2 text-[10px] bg-zinc-900 border-b border-zinc-800 text-zinc-500">
                <span id="video-title">STREAM: IDLE</span>
                <span id="video-close-btn" class="cursor-pointer text-red-800 hover:text-red-500" onclick="closeVideoPlayer()">[X] CLOSE</span>
            </div>
            <video id="video-player" class="w-full"></video>
        </div>
    </div>

    <!-- Terminal Container -->
    <div id="console-container">
        <div id="console-output"></div>
        <div class="console-input-row">
            <span>ARCH_OS:</span>
            <input type="text" id="console-input" spellcheck="false" autocomplete="off" placeholder="type 'help'...">
        </div>
    </div>

    <!-- Widgets -->
    <div class="widget-box diag-box" id="diag-widget">
        <div class="widget-header">
            <span class="widget-title">SYS_DIAG</span>
            <span id="uptime">UP: 00:00:00</span>
        </div>
        <div id="diag-logs" class="space-y-1 h-32 overflow-hidden opacity-60"></div>
        <div class="mt-2 pt-1 border-t border-[#1a1a1a] flex justify-between">
            <span>CPU: <span id="cpu-load">02%</span></span>
            <span class="hidden md:inline">MEM: 1.4GB</span>
        </div>
    </div>

    <div class="widget-box audio-box" id="audio-widget">
        <div class="widget-header">
            <span class="widget-title">AUDIO</span>
            <span id="current-time" class="text-white opacity-60">0:00</span> 
        </div>
        <div class="flex items-center gap-2 mb-1">
            <div class="status-dot flex-shrink-0"></div>
            <div class="truncate text-white opacity-80" id="track-name">INITIALIZING...</div>
        </div>
        <div class="progress-container" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="audio-controls">
            <button class="audio-btn font-bold text-white" id="play-btn">PLAY</button>
            <button class="audio-btn font-bold" id="skip-btn">SKIP</button>
        </div>
        <div class="vu-meter-container" id="vu-meter"></div>
        <audio id="main-audio" crossorigin="anonymous"></audio>
    </div>

    <!-- Main Navigation Content -->
    <main id="app-content" class="max-w-2xl relative z-20 opacity-0">
        <header class="mb-12 md:mb-20">
            <div class="flex items-center gap-3 mb-4 typewriter-line" data-delay="0">
                <div class="status-dot"></div>
                <h1 class="text-white text-xl tracking-tighter glitch-text">ARCHIVE_01</h1>
            </div>
        </header>

        <section class="space-y-8 md:space-y-12">
            <div class="group typewriter-line" data-delay="1600">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-text">01 / Utilities</span>
                <a href="#" class="red-hover border-b border-[#1a1a1a] w-full block py-2 text-lg">Web Tools</a>
            </div>

            <div class="group typewriter-line" data-delay="2400">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-text">02 / Visuals</span>
                <a href="#" class="red-hover border-b border-[#1a1a1a] w-full block py-2 text-lg">Gallery</a>
            </div>

            <div class="group typewriter-line" data-delay="3200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-text">03 / Documentation</span>
                <a href="#" class="red-hover border-b border-[#1a1a1a] w-full block py-2 text-lg">Writings</a>
            </div>

            <div class="group typewriter-line" data-delay="4000">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-text">04 / Network</span>
                <div class="flex flex-wrap items-center gap-x-6 gap-y-3">
                    <a href="https://csfloat.com" target="_blank" class="red-hover border-b border-[#1a1a1a] py-2 text-sm">CSFloat</a>
                    <a href="https://www.inaturalist.org" target="_blank" class="red-hover border-b border-[#1a1a1a] py-2 text-sm">iNaturalist</a>
                    <a href="https://letterboxd.com" target="_blank" class="red-hover border-b border-[#1a1a1a] py-2 text-sm">Letterboxd</a>
                    <a href="https://lighterpack.com" target="_blank" class="red-hover border-b border-[#1a1a1a] py-2 text-sm">LighterPack</a>
                    <a href="https://www.twitch.tv" target="_blank" class="red-hover border-b border-[#1a1a1a] py-2 text-sm">Twitch</a>
                </div>
            </div>
        </section>

        <footer class="mt-24 md:mt-32 pt-8 border-t border-[#111] typewriter-line" data-delay="4800">
            <div class="terminal-cursor" id="terminal-trigger"></div>
            <p class="text-[8px] mt-4 opacity-20">PRESS '~' FOR COMMAND INTERFACE</p>
        </footer>
    </main>

    <script>
        /**
         * PATH HANDLING LOGIC
         * Adjusts the REPO_BASE if we are in a GitHub repository subpath.
         */
        const isGithubRepo = window.location.pathname.includes('ARCHIVE-website');
        const REPO_BASE = isGithubRepo ? '/ARCHIVE-website/' : './';
        
        const TRACKS_JSON_URL = REPO_BASE + "tracks.json";
        const FILES_JSON_URL = REPO_BASE + "terminal_files.json";

        let audioTracks = [];
        let virtualFiles = {};
        
        let currentTrackIndex = 0;
        let siteBootTime = Date.now();
        let audioCtx, analyser, source, dataArray, isAudioContextInitialized = false;

        // DOM References
        const mainAudio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const skipBtn = document.getElementById('skip-btn');
        const trackName = document.getElementById('track-name');
        const progressBar = document.getElementById('progress-bar');
        const progressArea = document.getElementById('progress-area');
        const currentTimeDisplay = document.getElementById('current-time');
        const diagLogs = document.getElementById('diag-logs');
        const vuContainer = document.getElementById('vu-meter');
        const consoleContainer = document.getElementById('console-container');
        const consoleInput = document.getElementById('console-input');
        const consoleOutput = document.getElementById('console-output');
        const videoOverlay = document.getElementById('video-overlay');
        const videoPlayer = document.getElementById('video-player');
        const videoTitle = document.getElementById('video-title');
        const videoCloseBtn = document.getElementById('video-close-btn');

        const bootData = [
            "ESTABLISHING_VIRTUAL_NETWORK_INTERFACE...",
            "INITIALIZING_VIRTUAL_STACK...",
            "SUCCESS: ARCHIVE_OS_ONLINE"
        ];

        const systemMessages = [
            "PING_LATENCY: 14ms",
            "SYN_FLOOD_DETECTED: BLOCKED",
            "UPLINK_STABLE: 10Gbps",
            "CACHE_PURGED: 12.4MB",
            "HANDSHAKE_COMPLETE: NODE_04",
            "MEMORY_CLEANUP_SUCCESSFUL",
            "SENSORS_CALIBRATED",
            "PACKET_LOSS: 0.00%",
            "FILE_SYSTEM: READ_ONLY",
            "PORT_8080: LISTENING..."
        ];

        function runSystemLog() {
            setInterval(() => {
                const msg = systemMessages[Math.floor(Math.random() * systemMessages.length)];
                addDiagLine(msg);
            }, 3000);
        }

        const glitchChars = "!@#$%^&*()_+{}:<>?|[]-=/";
        function glitchEffect(element, originalText) {
            let iterations = 0;
            const interval = setInterval(() => {
                element.innerText = originalText.split("").map((char, index) => {
                    if (index < iterations) return originalText[index];
                    return glitchChars[Math.floor(Math.random() * glitchChars.length)];
                }).join("");
                if (iterations >= originalText.length) {
                    clearInterval(interval);
                    element.innerText = originalText;
                }
                iterations += 1/3;
            }, 30);
        }

        function runSiteCorruption() {
            setInterval(() => {
                if (Math.random() > 0.95) {
                    const targets = document.querySelectorAll('.glitch-text');
                    if (targets.length > 0) {
                        const target = targets[Math.floor(Math.random() * targets.length)];
                        glitchEffect(target, target.innerText);
                    }
                }
            }, 4000);
        }

        async function initializeData() {
            try {
                const tracksPromise = fetch(TRACKS_JSON_URL)
                    .then(res => {
                        if(!res.ok) throw new Error(`HTTP ${res.status} fetching tracks from ${TRACKS_JSON_URL}`);
                        return res.json();
                    });

                const filesPromise = fetch(FILES_JSON_URL)
                    .then(res => {
                        if(!res.ok) throw new Error(`HTTP ${res.status} fetching files from ${FILES_JSON_URL}`);
                        return res.json();
                    });

                const [tracksRes, filesRes] = await Promise.all([
                    tracksPromise.catch(err => {
                        console.error("Tracks load failed:", err);
                        addDiagLine(`FAIL: TRACKS_JSON [${err.message}]`, "var(--crimson)");
                        return [];
                    }),
                    filesPromise.catch(err => {
                        console.error("Files load failed:", err);
                        addDiagLine(`FAIL: FILES_JSON [${err.message}]`, "var(--crimson)");
                        return {};
                    })
                ]);

                audioTracks = tracksRes;
                virtualFiles = filesRes;
                
                if (audioTracks.length > 0) {
                    loadTrack(0);
                    addDiagLine("NETWORK_BUFFERS_READY");
                } else {
                    trackName.innerText = "NO_DATA_FOUND";
                    addDiagLine("WARN: EMPTY_TRACKLIST", "orange");
                }
            } catch (e) { 
                console.error("Critical Init Error:", e);
                addDiagLine("CRITICAL_BOOT_ERROR", "var(--crimson)"); 
            }
        }

        function loadTrack(index) {
            currentTrackIndex = index;
            const track = audioTracks[index];
            if (!track) return;
            // Resolve track URL relative to REPO_BASE
            mainAudio.src = track.url.startsWith('http') ? track.url : (REPO_BASE + track.url);
            trackName.innerText = track.name.toUpperCase();
        }

        function writeToConsole(text, color = "#666") {
            const line = document.createElement('div');
            line.style.color = color;
            line.style.marginBottom = "2px";
            line.innerText = text;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
            return line;
        }

        function openVideoPlayer(src, title, lockClose = false) {
            videoTitle.innerText = `STREAM: ${title.toUpperCase()}`;
            // Resolve video src relative to REPO_BASE
            videoPlayer.src = src.startsWith('http') ? src : (REPO_BASE + src);
            videoOverlay.style.display = 'flex';
            
            if (lockClose) {
                videoCloseBtn.style.display = 'none';
                videoPlayer.onended = () => {
                    closeVideoPlayer();
                };
            } else {
                videoCloseBtn.style.display = 'block';
                videoPlayer.onended = null;
            }
            
            videoPlayer.play();
        }

        function closeVideoPlayer() {
            videoPlayer.pause();
            videoPlayer.src = "";
            videoOverlay.style.display = 'none';
            videoCloseBtn.style.display = 'block'; 
        }

        consoleInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const raw = consoleInput.value.trim();
                const [cmd, arg] = raw.toLowerCase().split(' ');
                consoleInput.value = '';
                writeToConsole(`> ${raw.toUpperCase()}`, "#aaa");

                if (cmd === 'help') {
                    // Help menu matches your requirement (no "clear")
                    writeToConsole("COMMANDS: LIST, OPEN [FILE], TIMEWARP");
                }
                else if (cmd === 'list') {
                    const files = Object.keys(virtualFiles);
                    if (files.length === 0) writeToConsole("NO FILES FOUND.");
                    else files.forEach(f => writeToConsole(` - ${f}`));
                }
                else if (cmd === 'clear') {
                    consoleOutput.innerHTML = '';
                }
                else if (cmd === 'timewarp') {
                    writeToConsole("ACTIVATE_TIMEWARP", "var(--crimson)");
                    writeToConsole("SKIPPING 1 YEAR...", "var(--crimson)");
                    openVideoPlayer("log clips/oneyear.mp4", "TIMEWARP_SEQUENCE", true);
                }
                else if (cmd === 'open' && virtualFiles[arg]) {
                    writeToConsole(`ACCESSING: ${arg.toUpperCase()}`, "var(--crimson)");
                    writeToConsole(`\n${virtualFiles[arg].content}\n`);
                    // Check if file has an associated video clip
                    if (virtualFiles[arg].clip) {
                        openVideoPlayer(virtualFiles[arg].clip, arg);
                    }
                }
                else if (raw.length > 0) {
                    writeToConsole("ERR: COMMAND NOT FOUND");
                }
            }
        });

        function initAudioContext() {
            if (isAudioContextInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(mainAudio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 128;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isAudioContextInitialized = true;
                updateVUMeter();
            } catch(e) { console.error("Audio Context Error", e); }
        }

        const bars = Array.from({length: 16}, () => {
            const b = document.createElement('div');
            b.className = 'vu-bar';
            vuContainer.appendChild(b);
            return b;
        });

        function updateVUMeter() {
            if (isAudioContextInitialized && !mainAudio.paused) {
                analyser.getByteFrequencyData(dataArray);
                bars.forEach((bar, i) => {
                    const val = dataArray[i * 2] || 0;
                    bar.style.height = Math.max(2, (val/255)*18) + 'px';
                    val > 40 ? bar.classList.add('active') : bar.classList.remove('active');
                });
            }
            requestAnimationFrame(updateVUMeter);
        }

        playBtn.onclick = async () => {
            if (audioTracks.length === 0) {
                addDiagLine("ERR: NO_AUDIO_LOADED", "var(--crimson)");
                return;
            }
            initAudioContext();
            if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
            mainAudio.paused ? mainAudio.play() : mainAudio.pause();
            playBtn.innerText = mainAudio.paused ? "PLAY" : "PAUSE";
        };

        skipBtn.onclick = () => {
            if (audioTracks.length <= 1) return;
            loadTrack((currentTrackIndex + 1) % audioTracks.length);
            mainAudio.play();
            playBtn.innerText = "PAUSE";
        };

        progressArea.onclick = (e) => {
            if (!mainAudio.duration) return;
            const rect = progressArea.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const width = rect.width;
            const percentage = x / width;
            mainAudio.currentTime = percentage * mainAudio.duration;
        };

        function addDiagLine(text, color = null) {
            const log = document.createElement('div');
            log.innerText = `> ${text}`;
            if (color) log.style.color = color;
            diagLogs.prepend(log);
            if (diagLogs.children.length > 10) diagLogs.removeChild(diagLogs.lastChild);
        }

        function runBoot() {
            const screen = document.getElementById('boot-screen');
            let i = 0;
            const timer = setInterval(() => {
                if (i < bootData.length) {
                    const line = document.createElement('div');
                    line.className = 'post-line';
                    line.innerText = `[ OK ] ${bootData[i++]}`;
                    screen.appendChild(line);
                } else {
                    clearInterval(timer);
                    setTimeout(() => {
                        screen.style.opacity = '0';
                        setTimeout(() => {
                            screen.remove();
                            document.getElementById('app-content').style.opacity = '1';
                            document.querySelectorAll('.typewriter-line').forEach(line => {
                                setTimeout(() => line.classList.add('typing'), parseInt(line.getAttribute('data-delay')));
                            });
                            document.getElementById('diag-widget').style.opacity = '1';
                            document.getElementById('audio-widget').style.opacity = '1';
                            runSiteCorruption();
                            runSystemLog();
                        }, 400);
                    }, 300);
                }
            }, 100);
        }

        function toggleTerminal() {
            const visible = consoleContainer.style.display === 'flex';
            consoleContainer.style.display = visible ? 'none' : 'flex';
            if (!visible) setTimeout(() => consoleInput.focus(), 10);
        }

        window.addEventListener('keydown', (e) => { if (e.key === '~' || e.key === '`') { e.preventDefault(); toggleTerminal(); } });
        document.getElementById('terminal-trigger').onclick = toggleTerminal;

        window.onload = () => {
            initializeData();
            runBoot();
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - siteBootTime) / 1000);
                document.getElementById('uptime').innerText = `UP: ${String(Math.floor(elapsed / 3600)).padStart(2, '0')}:${String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0')}:${String(elapsed % 60).padStart(2, '0')}`;
                document.getElementById('cpu-load').innerText = `${Math.floor(Math.random() * 5 + 1)}%`;
            }, 1000);
        };

        mainAudio.ontimeupdate = () => {
            if (!mainAudio.duration) return;
            progressBar.style.width = `${(mainAudio.currentTime / mainAudio.duration) * 100}%`;
            const m = Math.floor(mainAudio.currentTime / 60);
            const s = Math.floor(mainAudio.currentTime % 60);
            currentTimeDisplay.innerText = `${m}:${s.toString().padStart(2, '0')}`;
        };
    </script>
</body>
</html>
