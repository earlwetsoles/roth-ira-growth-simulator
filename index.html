<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVE_01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --crimson: #991b1b;
            --terminal-gray: #666;
            --terminal-off-white: #eee;
            --glitch-color: #ff0000;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: var(--terminal-gray);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* 1. The Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* 2. The RGB Glitch Text */
        .glitch-text {
            display: inline-block;
            transition: color 0.2s, text-shadow 0.2s;
        }
        .glitch-text:hover {
            color: #ff3e3e !important;
            text-shadow: 2px 0 #00ff41, -2px 0 blue; 
        }

        /* 3. The Red Border Transition */
        .red-hover {
            border-bottom: 1px solid #1a1a1a;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }
        .red-hover:hover {
            color: #ff3e3e !important;
            border-color: #ff3e3e !important;
            padding-left: 8px;
        }

        /* Boot Screen */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 500;
            padding: 2rem;
            font-size: 11px;
            color: #444;
            display: flex;
            flex-direction: column;
            overflow-y: hidden;
            transition: opacity 0.4s ease;
        }

        .post-line { line-height: 1.4; white-space: nowrap; font-family: 'Space Mono', monospace; }
        .typewriter-line { overflow: hidden; white-space: nowrap; width: 0; opacity: 0; }
        .typing { animation: typing-anim 0.8s steps(30, end) forwards; opacity: 1; }
        @keyframes typing-anim { from { width: 0 } to { width: 100% } }

        /* Widgets */
        .widget-box {
            position: fixed;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 9px;
            z-index: 30;
            color: #444;
            opacity: 0;
            transition: opacity 1s ease;
        }

        @media (min-width: 768px) {
            .widget-box { width: 240px; right: 2rem; }
            .diag-box { top: 2rem; }
            .audio-box { top: 18rem; }
        }

        @media (max-width: 767px) {
            .widget-box { width: 45%; font-size: 8px; padding: 6px; bottom: 1rem; }
            .diag-box { left: 1rem; height: 110px; }
            .audio-box { right: 1rem; height: 130px; }
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 0.25rem;
        }
        .widget-title { color: var(--crimson); font-weight: bold; }
        
        /* Audio Elements */
        .progress-container { width: 100%; height: 4px; background: #1a1a1a; margin: 8px 0; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--crimson); width: 0%; pointer-events: none; }
        .audio-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .audio-btn { background: none; border: none; color: #444; cursor: pointer; padding: 0; transition: color 0.2s; outline: none; }
        .audio-btn:hover { color: var(--terminal-off-white); }

        .vu-meter-container { display: flex; gap: 2px; height: 20px; align-items: flex-end; margin-top: 10px; padding-top: 6px; border-top: 1px solid #111; }
        .vu-bar { flex: 1; background: #1a1a1a; height: 2px; transition: height 0.08s ease-out; }
        .vu-bar.active { background: #555; }
        .vu-bar.peak { background: var(--crimson); box-shadow: 0 0 4px var(--crimson); }
        
        .status-dot { width: 8px; height: 8px; background-color: #991b1b; border-radius: 9999px; box-shadow: 0 0 8px #991b1b; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        /* Console */
        #console-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #000; border-top: 1px solid var(--crimson);
            padding: 10px 20px; z-index: 1000; display: none;
            flex-direction: column; font-size: 12px; color: var(--terminal-off-white);
            max-height: 50vh;
        }
        #console-output { overflow-y: auto; margin-bottom: 5px; font-size: 10px; color: #666; max-height: 250px; }
        .console-input-row { display: flex; align-items: center; }
        #console-input { background: transparent; border: none; outline: none; color: inherit; flex-grow: 1; margin-left: 10px; font-family: inherit; }

        /* Video */
        #video-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 2000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .video-window { width: 80%; max-width: 900px; background: #000; border: 1px solid #333; position: relative; padding: 4px; }
        .video-window.lock-mode #video-close-btn { display: none; }
    </style>
</head>
<body class="p-8 md:p-24 pb-48 md:pb-24">

    <div id="boot-screen"></div>

    <div id="video-overlay">
        <div class="video-window" id="video-window-container">
            <div class="flex justify-between items-center p-2 text-[10px] bg-zinc-900 border-b border-zinc-800 text-zinc-500">
                <span id="video-title">STREAM: IDLE</span>
                <span id="video-close-btn" class="cursor-pointer text-red-800 hover:text-red-500" onclick="closeVideoPlayer()">[X] CLOSE</span>
            </div>
            <video id="video-player" class="w-full"></video>
        </div>
    </div>

    <div id="console-container">
        <div id="console-output"></div>
        <div class="console-input-row">
            <span>ARCH_OS:</span>
            <input type="text" id="console-input" spellcheck="false" autocomplete="off" placeholder="type 'help'...">
        </div>
    </div>

    <!-- DIAG WIDGET -->
    <div class="widget-box diag-box" id="diag-widget">
        <div class="widget-header">
            <span class="widget-title">SYS_DIAG</span>
            <span id="uptime">UP: 00:00:00</span>
        </div>
        <div id="diag-logs" class="space-y-1 h-32 overflow-hidden opacity-60"></div>
        <div class="mt-2 pt-1 border-t border-[#1a1a1a] flex justify-between">
            <span>CPU: <span id="cpu-load">02%</span></span>
            <span class="hidden md:inline">MEM: 1.4GB</span>
        </div>
    </div>

    <!-- AUDIO WIDGET -->
    <div class="widget-box audio-box" id="audio-widget">
        <div class="widget-header">
            <span class="widget-title">AUDIO</span>
            <span id="current-time" class="text-white opacity-60">0:00</span> 
        </div>
        <div class="flex items-center gap-2 mb-1">
            <div class="status-dot flex-shrink-0"></div>
            <div class="truncate text-white opacity-80 glitch-text" id="track-name">OFFLINE</div>
        </div>
        <div class="progress-container" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="audio-controls">
            <button class="audio-btn font-bold text-white glitch-text" id="play-btn">PLAY</button>
            <button class="audio-btn font-bold glitch-text" id="skip-btn">SKIP</button>
        </div>
        <div class="vu-meter-container" id="vu-meter"></div>
        <audio id="main-audio" crossorigin="anonymous"></audio>
    </div>

    <!-- MAIN CONTENT -->
    <main id="app-content" class="max-w-2xl relative z-20 opacity-0">
        <header class="mb-12 md:mb-20">
            <div class="flex items-center gap-3 mb-4 typewriter-line" data-delay="0">
                <div class="status-dot"></div>
                <h1 class="text-white text-xl tracking-tighter glitch-text glitch-target">ARCHIVE_01</h1>
            </div>
        </header>

        <section class="space-y-8 md:space-y-12">
            <div class="group typewriter-line" data-delay="1600">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">01 / Utilities</span>
                <a href="utilities.html" target="_blank" class="red-hover w-full block py-2 text-lg glitch-text glitch-target">Web Tools</a>
            </div>
            <div class="group typewriter-line" data-delay="2400">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">02 / Visuals</span>
                <a href="galleries.html" target="_blank" class="red-hover w-full block py-2 text-lg glitch-text glitch-target">Gallery</a>
            </div>
            <div class="group typewriter-line" data-delay="3200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">03 / Documentation</span>
                <a href="#" class="red-hover w-full block py-2 text-lg glitch-text glitch-target">Writings</a>
            </div>
            <div class="group typewriter-line" data-delay="4000">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest glitch-target">04 / Network</span>
                <div class="flex flex-wrap items-center gap-x-6 gap-y-3">
                    <a href="https://csfloat.com/stall/76561198136225158" target="_blank" class="red-hover py-2 text-sm glitch-text glitch-target">CSFloat</a>
                    <a href="https://www.inaturalist.org/observations?place_id=any&user_id=jiwt&verifiable=any" target="_blank" class="red-hover py-2 text-sm glitch-text glitch-target">iNaturalist</a>
                    <a href="https://letterboxd.com/Jiwt/" target="_blank" class="red-hover py-2 text-sm glitch-text glitch-target">Letterboxd</a>
                    <a href="https://lighterpack.com/r/lim3hg" target="_blank" class="red-hover py-2 text-sm glitch-text glitch-target">LighterPack</a>
                    <a href="https://www.twitch.tv/Jiwt" target="_blank" class="red-hover py-2 text-sm glitch-text glitch-target">Twitch</a>
                </div>
            </div>
        </section>

        <footer class="mt-24 md:mt-32 pt-8 border-t border-[#111] typewriter-line" data-delay="4800">
            <div class="terminal-cursor" id="terminal-trigger" style="display:inline-block; width:8px; height:15px; background:var(--crimson); animation:blink 1s step-end infinite; cursor:pointer;"></div>
            <p class="text-[8px] mt-4 opacity-20">PRESS '~' FOR COMMAND INTERFACE</p>
        </footer>
    </main>

    <script>
        // --- CONFIG ---
        const TRACKS_JSON_URL = "data/tracks.json";
        const FILES_JSON_URL = "data/terminal_files.json";

        // --- STATE ---
        let playlist = [];
        let virtualFiles = {};
        let currentTrackIdx = 0;
        let bootTime = Date.now();
        let audioCtx, analyser, dataArray, source;
        let isAudioInit = false;
        let isLocked = false;

        // --- DOM ---
        const audio = document.getElementById('main-audio');
        const trackNameEl = document.getElementById('track-name');
        const playBtn = document.getElementById('play-btn');
        const skipBtn = document.getElementById('skip-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressArea = document.getElementById('progress-area');
        const timeDisplay = document.getElementById('current-time');
        const diagLogs = document.getElementById('diag-logs');
        const vuContainer = document.getElementById('vu-meter');
        const videoOverlay = document.getElementById('video-overlay');
        const videoPlayer = document.getElementById('video-player');
        const videoTitle = document.getElementById('video-title');
        const consoleContainer = document.getElementById('console-container');
        const consoleInput = document.getElementById('console-input');
        const consoleOutput = document.getElementById('console-output');
        const videoWindow = document.getElementById('video-window-container');

        // --- INITIALIZATION ---
        async function initData() {
            try {
                const [tRes, fRes] = await Promise.all([
                    fetch(TRACKS_JSON_URL),
                    fetch(FILES_JSON_URL)
                ]);
                playlist = await tRes.json();
                virtualFiles = await fRes.json();
                if (playlist.length > 0) {
                    currentTrackIdx = Math.floor(Math.random() * playlist.length);
                    loadTrack(currentTrackIdx);
                }
            } catch (err) {
                console.error("Data fetch failed", err);
            }
        }

        function loadTrack(idx) {
            const track = playlist[idx];
            if (!track) return;
            audio.src = track.url;
            trackNameEl.innerText = track.name.toUpperCase();
        }

        // --- TERMINAL LOGIC ---
        function writeToConsole(text, color = "#666") {
            const line = document.createElement('div');
            line.style.color = color;
            line.style.marginBottom = "2px";
            line.style.whiteSpace = "pre-wrap";
            line.innerText = text;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        consoleInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const rawInput = consoleInput.value.trim();
                const parts = rawInput.toLowerCase().split(' ');
                const cmd = parts[0];
                const arg = parts.slice(1).join(' ');
                consoleInput.value = '';
                writeToConsole(`> ${rawInput.toUpperCase()}`, "#aaa");

                if (cmd === 'help') {
                    writeToConsole("AVAILABLE COMMANDS: HELP, LIST, OPEN [file], WHOAMI, TIMEWARP");
                } else if (cmd === 'list') {
                    const keys = Object.keys(virtualFiles);
                    if (keys.length === 0) writeToConsole("NO_LOGS_FOUND_IN_DIR.");
                    else keys.forEach(k => writeToConsole(` - ${k}`, "#888"));
                } else if (cmd === 'whoami') {
                    writeToConsole("IDENT: UNKNOWN_GUEST_NODE_1");
                    writeToConsole("STATUS: ACTIVE_INTERCEPTION", "var(--crimson)");
                } else if (cmd === 'timewarp') {
                    writeToConsole("ACTIVATE_TIMEWARP", "var(--crimson)");
                    writeToConsole("SKIPPING 1 YEAR...", "var(--crimson)");
                    setTimeout(() => {
                        openVideoPlayer('log clips/oneyear.mp4', 'TIMEWARP_SEQUENCE', true);
                    }, 1000);
                } else if (cmd === 'open') {
                    const file = virtualFiles[arg];
                    if (file) {
                        if (file.type === 'video') {
                            openVideoPlayer(file.url, arg);
                        } else if (file.type === 'external') {
                            window.open(file.url, '_blank');
                        } else {
                            writeToConsole(`\n--- ${arg.toUpperCase()} ---\n${file.content}\n`, "var(--crimson)");
                        }
                    } else {
                        writeToConsole(`ERR: '${arg}' NOT_FOUND.`);
                    }
                } else {
                    writeToConsole("ERR: COMMAND_UNRECOGNIZED.");
                }
            }
        });

        // --- VIDEO PLAYER ---
        function openVideoPlayer(url, title, locked = false) {
            isLocked = locked;
            videoTitle.innerText = `UPLINK: ${title.toUpperCase()}`;
            videoPlayer.src = url;
            videoOverlay.style.display = 'flex';
            
            if (locked) videoWindow.classList.add('lock-mode');
            else videoWindow.classList.remove('lock-mode');

            if (!audio.paused) audio.pause();
            videoPlayer.play();
        }

        function closeVideoPlayer() {
            if (isLocked) return;
            videoPlayer.pause();
            videoPlayer.src = "";
            videoOverlay.style.display = 'none';
        }

        videoPlayer.onended = () => {
            isLocked = false;
            closeVideoPlayer();
        };

        // --- UI & DIAGNOSTICS ---
        function addDiagLine(text, color = null) {
            const log = document.createElement('div');
            log.innerText = `> ${text}`;
            if (color) log.style.color = color;
            diagLogs.prepend(log);
            if (diagLogs.children.length > 12) diagLogs.removeChild(diagLogs.lastChild);
        }

        function runBoot() {
            const screen = document.getElementById('boot-screen');
            const bootLines = ["FS_MAPPED: TERMINAL_FILES.JSON", "NET_UPLINK: GITHUB_REMOTE", "ARCH_OS_v4.0.1", "STATUS: READY"];
            let i = 0;
            const timer = setInterval(() => {
                if (i < bootLines.length) {
                    const l = document.createElement('div');
                    l.className = 'post-line';
                    l.innerText = `[ OK ] ${bootLines[i++]}`;
                    screen.appendChild(l);
                } else {
                    clearInterval(timer);
                    setTimeout(() => {
                        screen.style.opacity = '0';
                        setTimeout(() => {
                            screen.remove();
                            document.getElementById('app-content').style.opacity = '1';
                            document.querySelectorAll('.typewriter-line').forEach(line => {
                                setTimeout(() => line.classList.add('typing'), parseInt(line.getAttribute('data-delay')));
                            });
                            document.getElementById('diag-widget').style.opacity = '1';
                            document.getElementById('audio-widget').style.opacity = '1';
                            addDiagLine("SYSTEM_ONLINE");
                        }, 400);
                    }, 300);
                }
            }, 100);
        }

        // --- LISTENERS ---
        window.addEventListener('keydown', (e) => {
            if (e.key === '~' || e.key === '`') {
                e.preventDefault();
                const visible = consoleContainer.style.display === 'flex';
                consoleContainer.style.display = visible ? 'none' : 'flex';
                if (!visible) setTimeout(() => consoleInput.focus(), 10);
            }
            if (e.key === 'Escape' && videoOverlay.style.display === 'flex') {
                closeVideoPlayer();
            }
        });

        document.getElementById('terminal-trigger').onclick = () => {
            consoleContainer.style.display = 'flex';
            consoleInput.focus();
        };

        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playBtn.innerText = "PAUSE"; }
            else { audio.pause(); playBtn.innerText = "PLAY"; }
        };

        skipBtn.onclick = () => {
            currentTrackIdx = (currentTrackIdx + 1) % playlist.length;
            loadTrack(currentTrackIdx);
            audio.play();
            playBtn.innerText = "PAUSE";
        };

        audio.onended = () => skipBtn.onclick();
        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            progressBar.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
            const m = Math.floor(audio.currentTime / 60);
            const s = Math.floor(audio.currentTime % 60);
            timeDisplay.innerText = `${m}:${s.toString().padStart(2, '0')}`;
        };

        window.onload = () => {
            initData();
            runBoot();
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - bootTime) / 1000);
                const h = Math.floor(elapsed / 3600);
                const m = Math.floor((elapsed % 3600) / 60);
                const s = elapsed % 60;
                document.getElementById('uptime').innerText = `UP: ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                document.getElementById('cpu-load').innerText = `${Math.floor(Math.random() * 5 + 1)}%`;
            }, 1000);
        };
    </script>
</body>
</html>
