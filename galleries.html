<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive_01 // Galleries</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --crimson: #991b1b;
            --terminal-gray: #666;
            --terminal-off-white: #eee;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #050505;
            color: var(--terminal-gray);
            overflow-x: hidden;
        }

        /* CRT Scanline Effect */
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 40;
            pointer-events: none;
            opacity: 0.3;
        }

        .link-item {
            border-bottom: 1px solid #1a1a1a;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }

        .link-item:hover {
            color: var(--terminal-off-white);
            border-bottom-color: var(--crimson);
            padding-left: 8px;
        }

        .link-item-full {
            width: 100%;
        }

        /* Typewriter Classes */
        .typewriter-line {
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            opacity: 0;
        }

        .typing {
            animation: typing-anim 0.8s steps(25, end) forwards;
            opacity: 1;
        }

        @keyframes typing-anim {
            from { width: 0 }
            to { width: 100% }
        }

        .back-btn {
            color: var(--crimson);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            display: inline-block;
        }

        .back-btn:hover {
            color: white;
        }
    </style>
</head>
<body class="p-8 md:p-24">
    <div class="scanline"></div>

    <main class="max-w-2xl relative z-20">
        <a href="index.html" class="back-btn typewriter-line" data-delay="100"><- RETURN_TO_ROOT</a>

        <header class="mb-20">
            <div class="flex items-center gap-3 mb-4 typewriter-line" data-delay="300">
                <div class="w-2 h-2 bg-red-800 rounded-full shadow-[0_0_8px_#991b1b] animate-pulse"></div>
                <h1 class="text-white text-xl tracking-tighter">MEDIA_ARCHIVE // PHOTOS</h1>
            </div>
            <p class="text-sm leading-relaxed max-w-md italic typewriter-line" data-delay="800">
                Visual data logs and compiled imagery.
            </p>
        </header>

        <section class="space-y-12">
            <!-- ALBUM SECTION TEMPLATE -->
            <!-- To add a new album, copy the div below -->
            <div class="group typewriter-line" data-delay="1200">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">ALBUM_01 / LATEST</span>
                <a href="#" class="link-item link-item-full block py-2 text-lg">Initial Uploads</a>
            </div>

            <div class="group typewriter-line" data-delay="1400">
                <span class="text-[10px] block mb-2 opacity-40 uppercase tracking-widest">ALBUM_02 / ARCHIVE</span>
                <a href="#" class="link-item link-item-full block py-2 text-lg">Legacy Collection</a>
            </div>

            <!-- Future Expandable Item Placeholder -->
            <div class="group typewriter-line opacity-20" data-delay="1600">
                <span class="text-[10px] block mb-2 uppercase tracking-widest">ALBUM_XX / PENDING</span>
                <span class="block py-2 text-lg italic">[ENCRYPTED_DATA]</span>
            </div>
        </section>

        <footer class="mt-32 pt-8 border-t border-[#111] typewriter-line" data-delay="2000">
            <p class="text-[10px] uppercase tracking-widest opacity-20">
                Visual Sync Complete.
            </p>
        </footer>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const lines = document.querySelectorAll('.typewriter-line');
            lines.forEach(line => {
                const delay = parseInt(line.getAttribute('data-delay'));
                setTimeout(() => { line.classList.add('typing'); }, delay);
            });
        });
    </script>
</body>
</html>
